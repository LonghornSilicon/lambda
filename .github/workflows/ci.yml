name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'paper/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  block-ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: kv_cache_engine
      expected-ff-count: 72
      has-reference-model: true
      has-paper: false
      has-coverage-gate: false
      has-formal-equivalence: true
      extra-rtl-sources: "sram_controller.sv"
