name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'paper/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  block-ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: kv_cache_engine
      # FF-count gate (Yosys synth -flatten, gate 3), DEFAULT params
      # (VECTOR_DIM=64, TIER=1, KEY_GROUP=16, OUTLIER_K=0). The grouped KEY path is
      # now wired into the top: keys route through cq_key_path (residual_buffer G*D*DW
      # + scale_bank D*DW + serialized per-channel INT4), and the SRAM record widened
      # to the unified per-channel key layout {D fp16 field, D INT4 codes} =>
      # SRAM_WIDTH ~= 1281 b (was 272). Count = SRAM (16*1281) + residual_buffer
      # (16*1024, KEY_GROUP kept 16 for the flop-based gate) + scale_bank + two
      # amax_units + value/key FSM regs. Local yosys 0.66 (memory_map+techmap) =
      # 46167 (26273 $_DFFE_PN0P_ + 3 $_DFFE_PN1P_ + 18902 $_DFFE_PP_ + 989 $_DFF_PN0_);
      # CI apt-yosys 0.33 (the arbiter) reports 46147 from the gate-3 log -- a 20-FF
      # opt delta between the two yosys versions, as expected.
      expected-ff-count: 46147
      has-reference-model: true
      has-paper: false
      has-coverage-gate: false
      has-formal-equivalence: true
      extra-rtl-sources: "sram_controller.sv cq_value_path.sv cq_key_path.sv residual_buffer.sv scale_bank.sv amax_unit.sv cq_units_syn.sv"
