name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'paper/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  block-ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: kv_cache_engine
      # FF-count gate (Yosys synth -flatten, gate 3). P2/P4b landed the real
      # ChannelQuant codec in the top: cq_value_path compresses each token and SRAM
      # now stores {fp16 scale, packed payload}, so SRAM_WIDTH = SCALE_WIDTH+D*VAL_BPV
      # = 16 + 64*4 = 272 bits (was the 1024-bit raw-fp16 passthrough). The synth cores
      # are combinational (0 FFs); the count is SRAM (16*272) + the serialized value
      # path + top FSM regs. Local yosys 0.65 reports 7626 (now the SRAM is *driven*,
      # so 0.65 no longer opt-strips it and should track CI's apt-yosys 0.33 closely).
      # CI's apt-yosys 0.33 reports 7633 (local 0.65 gave 7626 — a 7-FF DFFE-mapping
      # delta); 0.33 is the gate arbiter.
      expected-ff-count: 7633
      has-reference-model: true
      has-paper: false
      has-coverage-gate: false
      has-formal-equivalence: true
      extra-rtl-sources: "sram_controller.sv cq_value_path.sv amax_unit.sv cq_units_syn.sv"
