name: CI

# Triggers: every push or PR to master, plus manual dispatch.
# Skip on doc-only changes to save runner time.
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'memory/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

# When a new commit lands on the same branch, cancel the older in-progress run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # 1. Functional verification — iverilog runs the 253 TB cases.
  # Light job, runs on GitHub-hosted Ubuntu.
  # ------------------------------------------------------------------
  rtl-functional-verification:
    name: RTL functional verification (253 tests)
    runs-on: ubuntu-latest
    environment:
      name: rtl-functional-verification
      url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # no pip cache — no requirements.txt in repo

      - name: Install iverilog + numpy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog
          pip install --user numpy

      - name: Generate replay test vectors
        working-directory: rtl
        run: make testvectors

      - name: Directed testbench (110 cases)
        working-directory: rtl
        run: |
          make sim 2>&1 | tee /tmp/sim.log
          grep -q "ALL TESTS PASSED" /tmp/sim.log || (echo "Directed TB failed"; exit 1)

      - name: Replay testbench (143 cases from real attention scores)
        working-directory: rtl
        run: |
          make sim_realdata 2>&1 | tee /tmp/sim_realdata.log
          grep -q "Tests: 143  Pass: 143" /tmp/sim_realdata.log \
            || grep -q "ALL TESTS PASSED" /tmp/sim_realdata.log \
            || (echo "Replay TB failed"; exit 1)

          {
            echo "## RTL functional verification"
            echo ""
            echo "| Testbench | Cases | Result |"
            echo "|---|---|---|"
            echo "| Directed (\`tb_precision_controller.sv\`) | 110 | PASS |"
            echo "| Replay (\`tb_realdata.sv\`) | 143 | PASS |"
            echo "| **Total** | **253** | **PASS** |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # 2. RTL synthesis — Yosys sweep across tile/bit-width axes.
  # Light job, runs on GitHub-hosted Ubuntu.
  # ------------------------------------------------------------------
  rtl-synthesis:
    name: RTL synthesis (Yosys)
    runs-on: ubuntu-latest
    environment:
      name: rtl-synthesis
      url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yosys

      - name: Synthesize precision_controller
        working-directory: rtl
        run: |
          # No trailing `; stat`: the `synth` command already prints one
          # stats block (step 2.26 in the log). Adding another would print
          # the same numbers twice and double-count downstream.
          yosys -p "read_verilog -sv precision_controller.sv; \
                    synth -flatten -top precision_controller" \
                2>&1 | tee synth.log

          # Assert the FF count matches the closed-form prediction.
          # For default params (BLOCK_M=BLOCK_N=64, SCORE_WIDTH=8):
          #   FFs = 2*SCORE_WIDTH + log2(N) + 2 = 2*8 + 12 + 2 = 30
          # Yosys 0.33 emits cell types like `$_SDFFE_PN0P_` and
          # `$_SDFF_PN0_` with digits in the suffix; match anything
          # containing DFF and sum the last whitespace-delimited field.
          FF_COUNT=$(awk '/\$_S?DFF/ {sum+=$NF} END {print sum+0}' synth.log)
          CELL_COUNT=$(awk '/Number of cells:/{print $NF; exit}' synth.log)
          echo "FF count: $FF_COUNT (expected 30)"
          echo "Total cell count: $CELL_COUNT"

          # Write a nice markdown summary for the GitHub run page.
          {
            echo "## Yosys synthesis"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Flip-flops | $FF_COUNT (expected 30) |"
            echo "| Total cells | $CELL_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"

          [ "$FF_COUNT" = "30" ] || { echo "FF count mismatch"; exit 1; }

      - name: Upload synth log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yosys-synth-log
          path: rtl/synth.log
          retention-days: 30

  # ------------------------------------------------------------------
  # 3. OpenLane Sky130 sign-off — the heavy one.
  # ~3-10 min runtime, needs Docker. Runs on self-hosted runner.
  # See docs/ci_setup.md for runner setup instructions.
  # ------------------------------------------------------------------
  openlane-sky130:
    name: OpenLane Sky130 sign-off
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    # Adding an `environment` makes this job show up as a "Deployment"
    # in the right-hand sidebar of the repo home / PRs / commits — same
    # widget Vercel uses. `url` is what the "View deployment" button links to.
    environment:
      name: sky130-signoff
      url: https://github.com/LonghornSilicon/adaptive-precision-attention/blob/master/openlane/precision_controller/results/precision_controller.png
    steps:
      - uses: actions/checkout@v4

      - name: Confirm runner has librelane + docker
        run: |
          which docker
          which librelane || pip install --user librelane
          docker --version
          librelane --version

      - name: Run LibreLane Sky130 flow
        working-directory: openlane/precision_controller
        run: |
          # Flag order matters: --docker-no-tty must precede --dockerized.
          librelane --docker-no-tty --dockerized --condensed config.json

      - name: Assert sign-off (zero violations across all corners)
        working-directory: openlane/precision_controller
        run: |
          LAST_RUN=$(ls -1 runs/ | tail -1)
          echo "Validating $LAST_RUN"
          python3 - <<PYEOF
          import json, os, sys
          m = json.load(open(f"runs/$LAST_RUN/final/metrics.json"))
          checks = {
              "setup_vio":      m["timing__setup_vio__count"],
              "hold_vio":       m["timing__hold_vio__count"],
              "drc_error":      m["magic__drc_error__count"],
              "lvs_error":      m["design__lvs_error__count"],
              "antenna_vio":    m["route__antenna_violation__count"],
              "powergrid_vio":  m["design__power_grid_violation__count"],
          }
          ss_wns  = m["timing__setup__ws__corner:max_ss_100C_1v60"]
          tt_wns  = m["timing__setup__ws__corner:max_tt_025C_1v80"]
          ff_wns  = m["timing__setup__ws__corner:max_ff_n40C_1v95"]
          area    = m["design__instance__area__stdcell"]
          power   = m["power__total"] * 1e6
          ffs     = m["design__instance__count__class:sequential_cell"]

          # Step summary — rendered as markdown on the run page.
          summary = open(os.environ["GITHUB_STEP_SUMMARY"], "a")
          ok = all(v == 0 for v in checks.values())
          summary.write("## Sky130 OpenLane sign-off\n\n")
          summary.write("**" + ("PASSED" if ok else "FAILED") + "** — all corners checked.\n\n")
          summary.write("| Check | Value |\n|---|---|\n")
          for name, value in checks.items():
              mark = "PASS" if value == 0 else "FAIL"
              summary.write(f"| {name} | {value} ({mark}) |\n")
          summary.write("\n### Timing (setup WNS by corner)\n\n")
          summary.write("| Corner | WNS |\n|---|---|\n")
          summary.write(f"| FF (–40 °C, 1.95 V) | {ff_wns:+.3f} ns |\n")
          summary.write(f"| TT (+25 °C, 1.80 V) | {tt_wns:+.3f} ns |\n")
          summary.write(f"| SS (+100 °C, 1.60 V, sign-off) | {ss_wns:+.3f} ns |\n")
          summary.write("\n### Physical\n\n")
          summary.write(f"- Flip-flops: {ffs}\n")
          summary.write(f"- Stdcell area: {area:.0f} µm²\n")
          summary.write(f"- Total power (TT): {power:.1f} µW\n")
          summary.close()

          for name, value in checks.items():
              print(f"  {name}: {value}")
          if not ok:
              print("SIGN-OFF FAILED")
              sys.exit(1)
          print("SIGN-OFF PASSED — all corners clean")
          print(f"  SS WNS:   {ss_wns:+.3f} ns")
          print(f"  Area:     {area:.0f} um^2")
          print(f"  Power TT: {power:.1f} uW")
          PYEOF

      - name: Upload final GDS + metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sky130-signoff
          path: |
            openlane/precision_controller/runs/*/final/gds/*.gds
            openlane/precision_controller/runs/*/final/metrics.json
            openlane/precision_controller/runs/*/final/render/*.png
          retention-days: 30
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # 4. Reference model tests — Python + C++ bit-exact verification.
  # ------------------------------------------------------------------
  reference-model:
    name: Reference model tests (PC + MAC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # no pip cache — no requirements.txt in repo

      - name: Install dependencies
        run: |
          pip install --user numpy
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++

      - name: Run all reference model tests
        working-directory: sw/reference_model
        run: |
          make test-all 2>&1 | tee /tmp/refmodel.log

          {
            echo "## Reference model tests"
            echo ""
            echo "| Suite | Result |"
            echo "|---|---|"
            echo "| Python (precision controller) | PASS |"
            echo "| Python (MAC array) | PASS |"
            echo "| C++ (precision controller) | PASS |"
            echo "| C++ (MAC array) | PASS |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # 5. Paper build — compile LaTeX to PDF.
  # Light job, ~1 min. Runs on GitHub-hosted Ubuntu.
  # ------------------------------------------------------------------
  paper-build:
    name: Compile paper PDF
    runs-on: ubuntu-latest
    environment:
      name: paper
      url: https://github.com/LonghornSilicon/adaptive-precision-attention/blob/master/paper/adaptive_precision_attention.pdf
    steps:
      - uses: actions/checkout@v4

      - name: Install TeXLive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-bibtex-extra texlive-publishers

      - name: Build PDF
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error adaptive_precision_attention.tex
          bibtex  adaptive_precision_attention
          pdflatex -interaction=nonstopmode -halt-on-error adaptive_precision_attention.tex
          pdflatex -interaction=nonstopmode -halt-on-error adaptive_precision_attention.tex
          ls -lh adaptive_precision_attention.pdf

          # Pull stats for the run-page summary.
          PAGES=$(pdfinfo adaptive_precision_attention.pdf 2>/dev/null | awk '/^Pages:/{print $2}')
          SIZE=$(stat -c%s adaptive_precision_attention.pdf)
          SIZE_KB=$((SIZE / 1024))
          {
            echo "## Paper build"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Pages | $PAGES |"
            echo "| Size | ${SIZE_KB} KB |"
            echo ""
            echo "[Open latest PDF on GitHub](https://github.com/LonghornSilicon/adaptive-precision-attention/blob/master/paper/adaptive_precision_attention.pdf)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for undefined refs
        working-directory: paper
        run: |
          if grep -E "undefined|Citation .* undefined" adaptive_precision_attention.log; then
            echo "Undefined references found"
            exit 1
          fi
          echo "All references resolved"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/adaptive_precision_attention.pdf
          retention-days: 30

