name: CI (main — docs / analysis / reference / paper)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  block-ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: kv_cache_engine
      expected-ff-count: 3914       # required input; unused when has-rtl:false
      has-rtl: false                # RTL lives on the 'rtl' branch
      has-reference-model: false    # golden-vector parity runs on the rtl branch (vectors are there)
      has-paper: false
      has-coverage-gate: false
      has-formal-equivalence: false
