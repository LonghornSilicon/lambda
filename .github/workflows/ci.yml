name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'paper/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  block-ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: kv_cache_engine
      # FF-count gate (Yosys synth -flatten, gate 3), DEFAULT params
      # (VECTOR_DIM=64, TIER=1, KEY_GROUP=2, SRAM_DEPTH=2, OUTLIER_K=0). The grouped
      # KEY path is wired into the top (cq_key_path: residual_buffer + scale_bank +
      # serialized per-channel INT4 scale/quant/dequant), SRAM record = unified
      # per-channel key layout {D fp16 field, D INT4 codes} => SRAM_WIDTH ~= 1281 b.
      # KEY_GROUP and SRAM_DEPTH DEFAULTS are tiny (2) on purpose: they scale the two
      # behavioral flop MEMORIES (residual G*D*DW, SRAM depth*width) whose FFs
      # otherwise dominate and blow gate-4 formal induction past its ~10-min budget.
      # Real depth/G are set per-instantiation (the TBs override); D stays 64.
      # Local yosys 0.66 (memory_map+techmap) = 14730 (9175 $_DFFE_PN0P_ + 3
      # $_DFFE_PN1P_ + 4563 $_DFFE_PP_ + 989 $_DFF_PN0_). CI apt-yosys 0.33 (arbiter)
      # = 14724 from the gate-3 log (6-FF delta vs local 0.66=14730).
      expected-ff-count: 14724
      has-reference-model: true
      has-paper: false
      has-coverage-gate: false
      has-formal-equivalence: true
      extra-rtl-sources: "sram_controller.sv cq_value_path.sv cq_key_path.sv residual_buffer.sv scale_bank.sv amax_unit.sv cq_units_syn.sv"
