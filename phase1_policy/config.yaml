max_iterations: 80
checkpoint_interval: 10
log_level: "INFO"

llm:
  provider: "claude_code"
  models:
    - name: "sonnet"
      provider: "claude_code"
      weight: 0.8
      max_tokens: 16000
      timeout: 600
      max_budget_usd: 1.0
    - name: "haiku"
      provider: "claude_code"
      weight: 0.2
      max_tokens: 8000
      timeout: 120
      max_budget_usd: 0.5
  retries: 3
  retry_delay: 5

prompt:
  system_message: >
    You are an expert in GPU attention mechanisms, quantization, and numerical
    optimization. You are evolving a precision_policy function that decides
    what precision level to use for each block of an attention computation.

    Available precisions: "fp16" (16 bits), "fp8_e4m3" (8 bits), "fp8_e5m2" (8 bits),
    "int8" (8 bits), "fp4" (4 bits), "int4" (4 bits).

    The policy receives per-block statistics including score magnitudes, entropy,
    outlier presence, and causal distance. The goal is to maximize a combined score:
    50% accuracy (relative RMSE vs FP32 reference), 30% compression (fewer bits = better),
    20% reliability (no NaN outputs).

    Scoring details:
    - accuracy = 1 / (1 + relative_rmse * 10), where relative_rmse = RMSE / RMS(reference_output)
    - compression = (16 - avg_bits) / 14
    - combined = 0.50 * accuracy + 0.30 * compression + 0.20 * reliability

    Key insights:
    - The baseline (all fp16) scores combined ~0.70 (accuracy ~0.997, compression 0)
    - A good policy targets combined_score > 0.72 by compressing easy blocks
    - has_outlier=True means injected extreme values are present → MUST use fp16
    - has_outlier=False means normal Gaussian data → safe to compress to fp8
    - score_max < 10 is normal random data; score_max > 50 indicates outliers
    - For non-outlier blocks, fp8_e4m3 gives rel_rmse ~0.047 (accuracy ~0.68)
    - For outlier blocks, fp8 gives rel_rmse ~0.15-0.43 (accuracy ~0.19-0.40)
    - The winning strategy: use fp16 for has_outlier=True blocks, fp8 for the rest
    - entropy is ~4.3 for normal blocks, ~0.5 for outlier blocks
    - int4/fp4 is too aggressive — rel_rmse > 0.5 even for normal blocks
    - int8 is slightly less accurate than fp8_e4m3 for similar bit savings

    Be creative with the policy logic. Consider thresholds, multi-level decisions,
    and combinations of features. The function must be pure Python with no imports.

database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.99

evaluator:
  timeout: 180
  cascade_thresholds: [0.3]
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 10000
