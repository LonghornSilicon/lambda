# -----------------------------------------------------------------------------
# Why this architecture at 4 mm² — the audit
# -----------------------------------------------------------------------------
feasibility_audit:
  question: "Can 4 mm² hold a STANDALONE end-to-end transformer accelerator at 16nm targeting up to 1.5B-parameter models (validated on Qwen2-1.5B)?"
  answer: "Yes, with LPDDR5X x16 as the bandwidth tier and tight scope on every block. (The bandwidth headroom below was derived for the retired 3-5B target and comfortably covers a ≤1.5B target; the specific 4.8B/2.4B figures are pre-pivot and pending re-derivation.)"

  bandwidth_decision_is_load_bearing: |
    Decode is bandwidth-bound. Largest_model_GB ≈ bandwidth_GBs × time_per_tok / 2
    (factor 2 because INT4 is 0.5 bytes/param). For 5 tok/s threshold (200 ms/tok):
      - LPDDR4X x16 (6 GB/s):  1.2 GB → 2.4B params max
      - LPDDR5X x16 (12 GB/s): 2.4 GB → **4.8B params max**  ← v2 baseline
      - LPDDR5X x32 (25 GB/s): 5.0 GB → 10B params max (compute-bottlenecked; see stretch §)
    Choosing LPDDR5X x16 over LPDDR4X x16 costs +0.2 mm² PHY area (1.2 vs 1.0
    mm²) and +1 W power (1.5 vs 0.5 W). It DOUBLES the largest serviceable
    model class — comfortably covering the ≤1.5B / Qwen2-1.5B target.
    (Legacy framing said "slam dunk for 3-5B"; retired 2026-06-22.)

  key_architectural_decisions:
    - choose_pcie_gen3_x1_not_x4_or_usbc:
        rationale: |
          Tokens are kilobytes/sec. PCIe Gen3 x4 PHY (~1.0-1.3 mm² at 16nm)
          is overkill at 4 mm². USB-C 2.0 (60 MB/s) is functionally adequate
          for runtime token I/O but its 25-second weight-load latency is
          painful for development iteration and doesn't match modern
          inference-card form factor norms (M.2). PCIe Gen3 x1 (~0.55 mm²,
          1 GB/s, M.2 2280 form factor) is the right middle: 3× more BW
          than runtime needs, 1.5 sec weight load, public-datasheet vendor IP.
          Revised 2026-05-14 from USB-C 2.0 baseline.
        savings_mm2_vs_pcie_x4: 0.75
        cost_vs_usbc: +0.25
    - use_lpddr5x_x16_not_x64_or_x32:
        rationale: |
          LPDDR5X x64 PHY (~2.5 mm²) breaks the 4 mm² budget hard. x32 (~1.8 mm²)
          forces near-zero on-die SRAM and undersized compute (see v2-stretch §).
          x16 (~1.2 mm²) is the right balance: 12 GB/s sustained, leaves enough
          area for an 8×8 MatE plus 1 MB SRAM.
    - shrink_compute_fabric_aggressively:
        rationale: |
          In the bandwidth-bound regime GOPS_needed = 2 × BW_GBs / W4_bytes
          = 2 × 11.94 / 0.5 ≈ 48 GOPS — *constant across model size*. 8×8 MatE
          delivers 76.8 GOPS sustained at 60% util → **1.6× headroom**.
          (Earlier drafts claimed "3×" or "3-5×" — that was wrong; the
          bandwidth-bound floor scales WITH bandwidth, not with model size.)
          0.10 mm² for 8×8 vs 1.2 mm² for the abandoned 32×32 flagship —
          right-sized for v2's model class and bandwidth tier.
    - keep_kve_area_tight:
        rationale: |
          The KVE runs streaming ChannelQuant: a per-channel FP16 scale bank,
          one shared fp16 compute unit (scale/quant/dequant) serialized across
          the D channels (single divide cone), the static top-k (k=2) outlier
          ROM mask, and the unified per-channel SRAM record. Compression is
          ~3.8× vs FP16 at ~4 bits/value. The block PPA at 16nm (area/power/Fmax)
          is TBD — pending re-measurement for ChannelQuant. Acceptable on this
          die size given KV is bandwidth-bound regardless.

  fixed_cost_floor_at_4mm2:
    # Corrected 2026-04-26 by area audit; revised 2026-05-14
    items:
      - id: io_ring_pads_esd
        area_mm2: 0.76
        basis: |
          For 2000×2000 µm die: perimeter = 8000 µm × 100 µm ring width
          = 0.8 mm² before corner-cell sharing → 0.76 mm² after subtracting
          4 × (100×100 µm²) corner overlaps. Conservative 100 µm ring is
          standard for 16nm GPIO library (Sofics/TSMC) with 2 kV HBM ESD.
      - id: clock_tree_power_grid_routing_overhead
        area_mm2: 0.4
        basis: ~10% of die at 16nm (standard heuristic)
      - id: lpddr5x_x16_phy
        area_mm2: 1.2
        basis: |
          Single 16-bit LPDDR5X PHY at 16nm. Extrapolated from x64 ~2.5 mm²
          with sub-linear scaling (analog calibration is fixed cost; only
          data lanes scale with width). x16 ≈ 50% of x64 = 1.2 mm². NDA-gated.
          OPENEDGES has shipped LPDDR5/4 PHY in silicon at 14/16nm — feasibility
          confirmed; exact area requires direct vendor quote.
        risk: high                                             # ±0.3 mm² real swing; budget breaks at 1.5
      - id: host_iface_pcie_gen3_x1
        area_mm2: 0.55
        basis: |
          PCIe Gen3 x1 PHY (Synopsys DesignWare or Cadence) ~0.35 mm² at 16nm
          + controller/CSR/doorbell ~0.20 mm². Revised 2026-05-14 from
          USB-C 2.0 baseline (was 0.30 mm²).
      - id: subtotal_fixed_cost
        area_mm2: 2.66
        notes: 66.5% of the 4 mm² die before any compute or memory.

  what_fits_after_floor:
    available_budget_mm2: 1.34                                 # corrected: 4.0 - 2.66 = 1.34
    proposed_allocation:
      - block: matrix_engine_8x8
        area_mm2: 0.10
        basis: |
          64 PEs × ~600 µm²/PE = 0.038 mm² + auxiliary (input/output buffers
          0.04, accumulator 0.02, activation Q/dQ 0.04, pipeline/control 0.02)
          ≈ 0.10-0.16 mm² total. Use 0.10 as the design target; budget 0.16
          if v0.3 audit finds the auxiliary blocks larger than expected.
          Flagship 32×32 at 1.2 mm² total / 1024 PEs scales sub-linearly.
      - block: vector_unit_8_lane
        area_mm2: 0.15
        basis: 8 lanes × 16-bit FP16/BF16. Quarter scale of flagship's 32-lane.
      - block: kv_compression_engine                           # KVE (ChannelQuant)
        area_mm2: TBD                                          # TBD (pending re-measurement for ChannelQuant); prior placeholder 0.08 was TurboQuant-era
        basis: |
          Streaming ChannelQuant: per-channel FP16 scale bank + one serialized
          shared fp16 compute unit (scale/quant/dequant) + static top-k (k=2)
          outlier ROM mask + unified per-channel SRAM record. Physical area TBD.
      - block: memory_subsystem_controller
        area_mm2: 0.18
        basis: 1 LPDDR ch + 4-port crossbar + 128-entry block table; no continuous batching, no Tier-3 eviction.
      - block: layer_sequencer_minimal
        area_mm2: 0.10
        basis: 32-instruction ISA, 4K microcode, 16×32b GPR.
      - block: SRAM_total
        area_mm2: 0.71
        size_mb_at_baseline: 0.8
        basis: |
          0.8 MB at 1.25 MB/mm² HD 1-port + ~10% compiler overhead = 0.71 mm².
          ROOM FOR 1.0 MB ONLY IF PHY comes in at 1.0 mm² (vendor best case);
          mid-case PHY at 1.2 mm² forces SRAM to 0.7-0.8 MB.
    total_compute_and_memory_mm2: 1.32
    headroom_mm2: 0.02                                         # 4.0 - 2.66 - 1.32 = 0.02
    verdict: feasible_with_essentially_zero_headroom_at_phy_1.2mm2_assumes_0.8MB_SRAM

  pivotal_uncertainty: |
    The single load-bearing variable is the LPDDR5X x16 PHY area.
      - At 1.0 mm² (vendor best case): v2 fits at 4.0 mm² with 1.0 MB SRAM
      - At 1.2 mm² (planning estimate): v2 fits at 4.0 mm² with 0.8 MB SRAM
      - At 1.5 mm² (vendor worst case): v2 does NOT fit at 4.0 mm²
                                        → must downgrade to LPDDR4X x16
                                          (loses bandwidth → 1.2B model max)
                                        OR grow die to 4.5 mm² (~+12% shuttle cost)
    The first concrete next step is the IMEC mini@sic 2.0 quote AND the LPDDR5X
    x16 PHY quote from Synopsys + Cadence. Until those arrive, every other
    decision is provisional.

  recommended_first_shrinks_in_priority_order:
    - id: shrink_sram_to_0_8mb
      saves_mm2: 0.18
      cost: |
        KV scratchpad drops to 0.4 MB (from 0.5 MB). ~370 single-layer tokens
        for Llama-3.2-3B (8 KV × 128); still 3,750 for Qwen2.5-3B (2 KV × 128).
        Activation buffer stays at 0.3 MB (FA tile=8-16 still works). Weight
        buffer stays at 0.1 MB (still 80× streaming minimum at 12 GB/s).
      recommended_first: true
    - id: tighten_io_ring_to_0_7mm2
      saves_mm2: 0.06
      cost: |
        Use a more aggressive 80 µm ring width at 16nm (vs 100 µm conservative).
        Possible with library tuning; consult Sofics 16nm GPIO docs.
      recommended_second_if_first_insufficient: true
    - id: shrink_host_iface_to_smaller_pcie_or_spi
      saves_mm2: 0.35
      cost: |
        Drop from PCIe Gen3 x1 (0.55 mm²) to a smaller iface (e.g., 4-pin SPI
        + 2 GPIO interrupt + JTAG only, ~0.20 mm²). Loses PCIe / M.2 convenience;
        user must connect via dev-board adapter or custom carrier.
      not_recommended_unless_phy_quote_disastrous: true

