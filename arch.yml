# Verification
# -----------------------------------------------------------------------------
verification:
  total_tests_estimated: 240
  breakdown_by_block:
    matE: 50
    vecU: 25
    kve: 60
    msc: 50
    lsu: 30
    hif: 25
  reuse_from_130nm_sky130_track: ~40%                          # was "reuse_from_lasso"; 130nm work now in the Chipathon repo
  effective_new_tests: ~180
  estimated_person_months_at_student_velocity: ~28

# -----------------------------------------------------------------------------
# Cost
# -----------------------------------------------------------------------------
cost_analysis:
  shuttle_cost_estimate_usd: 60_000_to_100_000
  shuttle_cost_basis: |
    IMEC / Europractice mini@sic 2.0 academic-discount Full Block at TSMC
    16nm. Pricing non-public; reconfirm via eptsmc@imec.be price-request form.
    Comparable Muse 4 mm² Full Block ~$75K.
  ip_licensing_cost_estimate_usd: 80_000_to_150_000
  ip_licensing_basis: |
    LPDDR5X x16 PHY (Synopsys or Cadence) ~$80-130K (LPDDR5X is more expensive
    than LPDDR4X by ~50%). PCIe Gen3 x1 PHY (Synopsys DesignWare or Cadence
    PCIe Gen3) ~$30-60K. Total ~$110-190K.
  total_chip_cost_usd: 170_000_to_290_000                      # revised 2026-05-14 for PCIe Gen3 x1 IP licensing

# =============================================================================
# v2 STRETCH — LPDDR5X x32 PHY (the larger-model alternative within v2)
# =============================================================================
# Documented for the user to evaluate. Not the v0.2 baseline.

v2_stretch_lpddr5x_x32:
  description: |
    Trade SRAM and KV scratchpad for ~2× more LPDDR bandwidth, enabling
    7-8B-class models on the same 4 mm² die. Compute becomes the bottleneck
    rather than bandwidth.

  area_accounting_mm2:
    # Updated 2026-05-14 to reflect PCIe Gen3 x1 HIF + TIU addition (Phase 0).
    lpddr5x_x32_phy: 1.80                                      # +0.6 vs baseline LPDDR5X x16
    io_ring_pads_esd: 0.70                                     # tightened 80 µm
    clock_tree_and_power_grid: 0.40
    matrix_engine_8x8: 0.10
    vector_unit_8_lane: 0.144
    kv_compression_engine: TBD                                 # KVE (ChannelQuant) area TBD; total_mm2 below holds 0.08 as placeholder
    tiu_token_importance_unit: 0.03                            # NEW
    memory_subsystem_controller: 0.18
    layer_sequencer: 0.10
    host_interface_pcie_gen3_x1: 0.55                          # WAS 0.30 (serial HIF); revised Phase 0.1
    sram_kv_scratchpad_0_15mb: 0.12                            # -0.28 vs baseline (huge cut to fit wider PHY)
    sram_activation_buffer_0_2mb: 0.16
    sram_weight_buffer_0_05mb: 0.04
    codebook_const_rom_64kb: 0.05
    routing_overhead_buffer: 0.10
    total_mm2: 4.654                                           # was 4.38 pre-Phase-0; now well over even with shrinks
    headroom_mm2: -0.654
    die_utilization_pct: ~116
  area_status: OVER_BUDGET — needs 4.7-4.8 mm² die (~+18-20% shuttle cost). NOT RECOMMENDED for v0.4.

  bandwidth_and_perf:
    sustained_bandwidth_gb_s: 25
    largest_reasonable_model_at_5_tok_s: ~10B params (theoretical bandwidth)
    bottleneck_at_7B: compute (98 GOPS needed vs 78 GOPS sustained = 80% utilization required)
    realistic_perf:
      - model: Mistral-7B / Qwen2.5-7B / Llama-3.1-8B
        params_billion: 7_to_8
        weight_GB_w4: 3.5_to_4.0
        ms_per_tok_bandwidth: 140_to_160
        tok_per_sec_bandwidth_bound: 6.3_to_7.1
        tok_per_sec_compute_bound: ~5.5
        actual_tok_per_sec: ~5.5_to_6                          # min of the two; compute-bound
        verdict: borderline_5to6_tok_s
      - model: Llama-3-8B
        params_billion: 8
        weight_GB_w4: 4.0
        actual_tok_per_sec: ~5
        verdict: at_threshold

  trades_against_v2_baseline:
    pros:
      - Largest serviceable model class jumps from 5B to 7-8B (same as flagship targeted)
      - First open-source academic 8B-class accelerator at 4-4.5 mm²
      - Research story is materially stronger
    cons:
      - Die area pushes to ~4.4 mm²; ~20-25% shuttle cost overage (estimated $90-130K)
      - LPDDR5X x32 PHY area uncertainty is bigger absolute swing (1.8 ± 0.4 mm²)
      - On-die KV scratchpad shrinks to 0.15 MB — practically vestigial
      - Compute fabric bottlenecks at 7-8B (utilization > 80% required)
      - Verification load grows: ~30 PM (vs v2 baseline's ~28)
      - Power budget grows to ~5.5-6 W (LPDDR5X x32 ~3 W vs x16 ~1.5 W)

  when_to_choose_stretch:
    - Faculty/sponsor specifically wants "8B-class on 4 mm²" headline
    - Budget can absorb ~$90-130K shuttle (vs v2 baseline ~$60-100K)
    - Team is comfortable with LPDDR5X x32 PHY integration risk
    - Compute-bottlenecked operation is acceptable (drops sub-linear scaling
      vs bandwidth-bound)

  when_to_NOT_choose_stretch:
    - Cost overage is unfundable
    - PHY integration risk is already maxed out for the team
    - the ≤1.5B model class is sufficient for the customer wedge
    - On-die KV scratchpad (essentially zero in stretch) is required for any reason

  recommendation: |
    Don't pre-commit to the stretch in v0.2. Get the LPDDR5X x16 quote first.
    If x16 PHY comes in well under 1.2 mm² (e.g., 1.0 mm²), the area savings
    can fund a stretch to x32 — or grow SRAM. If x16 comes in over 1.2 mm²,
    even baseline v2 is at risk and stretch is off the table.

# -----------------------------------------------------------------------------
# Recommendation
# -----------------------------------------------------------------------------
recommendation:
  status: PROPOSED_AMBITIOUS_ALTERNATIVE_TO_V1
  one_line: |
    Choose Lambda v2 if the team can absorb LPDDR PHY integration risk and
    wants a STANDALONE chip running up to 1.5B-parameter models (validated on
    Qwen2-1.5B) on-die at 6-8 tok/s.

  why_v2_at_lpddr5x_x16: |
    The LPDDR5X x16 PHY upgrade vs LPDDR4X x16 doubles bandwidth (12 vs 6 GB/s)
    for +0.2 mm² die area and +1 W power, giving comfortable headroom over the
    ≤1.5B / Qwen2-1.5B target at the SAME 4 mm² die — in 1/6 the area and 1/5
    the cost of the abandoned 25 mm² flagship. FLAG: the specific model-class
    figures this paragraph was built on (~1.2B / ~5B / 3-4B / 7-8B) are
    pre-pivot and pending re-derivation.

  why_proceed: |
    First open-source academic standalone transformer accelerator at 4 mm²
    (validated on Qwen2-1.5B). No prior silicon at this scale + openness +
    workload class exists. Apple Neural Engine and Qualcomm Hexagon are the
    closest commercial cousins; both proprietary integrated SoCs.

  why_caution: |
    LPDDR PHY at 16nm is the team's first FinFET-era PHY integration. The
    1.2 mm² estimate has ±0.3 mm² real uncertainty. If PHY comes in at 1.5 mm²,
    every other block has to shrink. Hire/partner with senior PD engineer
    with FinFET + DDR PHY experience as condition of this path.

  next_concrete_steps:
    - 1_decide_v1_vs_v2:
        owner: architecture_lead + faculty_advisor
        deliverable: explicit go/no-go on v1-conservative vs v2-ambitious
        deadline: 2026-06
    - 2_quote_imec_4mm2:
        owner: architecture_lead
        deliverable: written IMEC / Europractice mini@sic 2.0 quote for 4 mm² N16FFC
        deadline: 2026-05
    - 3_lpddr5x_x16_phy_quote:
        owner: architecture_lead
        deliverable: written LPDDR5X x16 PHY quote at 16nm (Synopsys + Cadence)
        deadline: 2026-06
    - 4_choose_target_model:
        owner: architecture_lead + ML student
        deliverable: explicit primary model (Llama-3.2-3B vs Qwen2.5-3B vs Mistral-NeMo-3B)
        deadline: 2026-07

# -----------------------------------------------------------------------------
# Risks
# -----------------------------------------------------------------------------
risks:

  - id: R-Lv2-01
    severity: critical
    description: LPDDR5X x16 PHY integration is unprecedented for the team
    evidence: |
      The prior 130nm Sky130 track (now the Chipathon repo; never fabricated)
      was all-digital via Caravel. v2 introduces LPDDR PHY: clock-domain
      crossings, reference voltages, calibration loops, analog corner
      verification.
    mitigation: |
      Mandatory hire/partner with senior PD engineer with FinFET + DDR PHY
      experience. Single biggest non-architectural risk.

  - id: R-Lv2-02
    severity: high
    description: Zero/negative headroom in 4 mm² area budget
    evidence: 4.06 mm² of 4.0 mm² target = 1.5% over.
    mitigation: Apply `shrink_kv_scratchpad_to_0_4mb` early in v0.2.

  - id: R-Lv2-03
    severity: high
    description: LPDDR5X x16 PHY area estimate (1.2 mm²) could be 1.0 to 1.5
    evidence: |
      Vendor IP at 16nm is NDA-gated. The 1.2 mm² estimate scales from x64
      LPDDR5X (~2.5 mm²) with ~50% sub-linear scaling.
    mitigation: |
      Vendor quote in Q2 2026. If 1.5 mm², chip becomes infeasible at 4 mm²
      → fall back to LPDDR4X x16 (loses model class) or grow to 4.5 mm².

  - id: R-Lv2-04
    severity: medium
    description: ≤1.5B model class commoditized by mobile SoC NPUs by Lambda tape-out (Summer 2027)
    evidence: |
      Apple / Snapdragon on-device NPUs already target small on-device models
      and the commoditized class keeps moving up. FLAG: the specific "3-5B by
      2028" market framing this risk was written around is retired (target is
      now ≤1.5B; canonical tape-out is Summer 2027) — the market-timing
      analysis needs human re-derivation.
    mitigation: |
      Position chip as "smallest viable open standalone accelerator", not
      "best in a given parameter class." The ≤1.5B / Qwen2-1.5B target is the
      validation point, not a competitive-perf claim.

  - id: R-Lv2-05
    severity: medium
    description: KVE (ChannelQuant) physical PPA at 16nm not yet measured
    mitigation: |
      Block RTL is complete through Sky130 sign-off in the kv-cache-engine repo;
      re-measure area/power/Fmax at TSMC 16nm (currently TBD). Compression
      (~3.8× at ~4 bits/value) and accuracy (near-lossless at CQ-4+) are
      characterized; only the 16nm PD numbers are pending.

  - id: R-Lv2-06
    severity: medium
    description: ~28 person-months verification scales tight against 5-7 person team
    mitigation: |
      Either grow team for v2 or accept v1's lower load (~22 PM). Don't try
      v2 with v1's team capacity.

  - id: R-Lv2-07
    severity: low
    description: Single-session-only operation limits demo richness
    mitigation: |
      Single-session is fine for "tiny LLM ASIC running standalone" pitch.
      If continuous batching matters, that argues for upsizing — currently
      excluded per 4 mm² budget commitment.

