      Commercial-flow only. OpenLane 2 does not signoff at 16nm. IMEC /
      Europractice provides tool access bundled with mini@sic registration.

# -----------------------------------------------------------------------------
# Target workload — up to 1.5B-parameter transformer inference (validated on Qwen2-1.5B; legacy 3-5B tables below pending re-derivation)
# -----------------------------------------------------------------------------
target_workload:
  # PENDING RE-DERIVATION (post-2026-06-22 pivot): the canonical target is now
  # "up to 1.5B parameters, validated on Qwen2-1.5B". The per-model examples,
  # decode-throughput tables and capacity_math below are the pre-pivot 3-5B
  # analysis (and assume the TurboQuant 4.0 bpe codec). They are retained
  # verbatim as historical derivations and need human re-derivation against
  # Qwen2-1.5B + ChannelQuant (~4 bits/value). Do not read them as the target.
  primary_model_class:
    name: up to 1.5B-parameter dense decoder transformer (validated on Qwen2-1.5B)
    legacy_class_pre_pivot: 3-5B-parameter dense decoder transformer   # retired 2026-06-22
    examples:
      - Qwen2-1.5B (validation model; ≤1.5B target)
      # --- legacy 3-5B example set (pre-pivot; pending re-derivation) ---
      - Llama-3.2-3B (3B params, 28 layers, 8 KV × 128 dim)             # 7.4 tok/s borderline interactive
      - Phi-3.5-mini-instruct (3.8B, 32 layers, 32 KV × 96 dim)         # 6.3 tok/s borderline
      - Qwen2.5-3B (3.1B, 36 layers, 2 KV × 128 dim)                    # 7.7 tok/s + best long-context (2 KV heads → 4× the on-die capacity of 8-head peers; 32K serviceable via LPDDR streaming at ~24 ms/tok overhead)
      - Mistral-NeMo-3B (3B, 28 layers, 8 KV × 128 dim)                 # 8.0 tok/s comfortable
      - Gemma-2-2B (2B, 26 layers, 4 KV × 256 dim)                      # 11.9 tok/s comfortable
      - Llama-3.2-1B (1.2B, 16 layers, 8 KV × 64 dim)                   # 19.3 tok/s; uses bandwidth headroom
      - SmolLM2-360M (360M, 30 layers, 5 KV × 64 dim)                   # 66 tok/s
    parameters: up_to_1_5B                                     # canonical target (validated on Qwen2-1.5B); legacy analysis below assumed 1B_to_5B
    weight_bits_target: 4
    weight_bytes_total_w4: 0.5_to_2.5_GB
    activation_bits: 8
    head_dim_typical: 64_to_128
    n_heads_kv_typical: 2_to_8
    n_layers_typical: 16_to_36
    largest_reasonable_model_basis: |
      "Reasonable" = 5 tok/s decode (above human reading speed; usable for
      chat/agent). With 12 GB/s sustained LPDDR5X x16 and 200 ms time budget:
      weights_GB = 12 × 0.2 = 2.4 GB. At INT4, that's 2.4 / 0.5 = 4.8B params.
      Round down to 4-5B as the design point; 5B is at the edge.

      Compute headroom check: 5B × 2 ops × 5 tok/s = 50 GOPS. Available
      0.13 TOPS × 60% util = 78 GOPS. Compute fits with 30%+ margin even
      at the largest model.

  context_length_targets:
    baseline_tokens: 4096
    stretch_tokens: 16384
    stretch_with_lpddr_streaming_tokens: 32768

  serving_regime:
    primary: single_user_single_session_decode
    secondary: NONE                                            # single-session chip
    deliberately_excluded:
      - large_batch_serving (won't fit in 0.3 MB activation buffer)
      - 7B+ models (LPDDR5X x16 12 GB/s caps reasonable model at ~5B)
      - long-context_>32K (KV bandwidth at 12 GB/s limits long context)
      - prefill_>256_tokens (compute fabric is small)

  why_this_workload: |
    The ≤1.5B class (validated on Qwen2-1.5B) is a deployable on-device LLM
    regime for 2026-28. Apple Intelligence, Google Gemini Nano, Microsoft
    Copilot+ target small on-device models. Lambda is the **first open-source
    academic standalone accelerator** at this scale — closest commercial
    cousins are Apple Neural Engine and Qualcomm Hexagon NPU, both proprietary
    integrated SoCs.

    The pitch is **≤1.5B inference at 3-4 W, standalone, open-source, 4 mm².**
    Not "the fastest on this workload" (an x86 CPU at 30-50 W is faster) but
    "the smallest, lowest-power, and only open-source option."
    (Legacy drafts framed this as a "3-5B" pitch; retired 2026-06-22.)

  capacity_math:
    # NOTE: the per-model byte counts and token capacities below were derived for
    # the retired 3-5B example set at the pre-pivot codec. They are TBD — pending
    # re-derivation for ChannelQuant (~4 bits/value) / Qwen2-1.5B. The formula
    # itself holds; only the codec's bits/value and the model dims change.
    kv_byte_formula: |
      per_token_kv_bytes_layer = kv_heads × head_dim × 2 (K+V) × bits_per_value / 8
      ChannelQuant bits_per_value ≈ 4.13–4.38 (measured; depends on head dim D),
      i.e. ~4 bits/value → ~3.8× compression vs FP16. The token-capacity numbers
      below still use the pre-pivot codec bpe and are TBD (pending re-derivation).
    kv_scratchpad_size_mb: 0.4                                 # baseline; 0.5 if PHY <= 1.0 mm²
    model_class_examples:
      - name: Llama-3.2-3B (8 KV × 128 dim, 28 layers)
        weight_bytes_w4: 1_605_000_000                         # 3.21B × 0.5
        per_token_kv_bytes_layer: 1024                         # 8 × 128 × 2 × 4.0/8
        per_token_kv_bytes_all_layers: 28672                   # × 28 layers
        decode_ms_at_12gbs: 134
        decode_tok_per_sec: 7.4
        kv_scratchpad_capacity_tokens_at_0_4mb: 409            # ⌊0.4 × 1024² / 1024⌋
        kv_scratchpad_capacity_tokens_at_0_5mb: 512
        context_4k_lpddr_stream_ms_per_tok: ~9                 # 4K × 28 × 1024 / (12 GB/s)
        context_32k_lpddr_stream_ms_per_tok: ~75               # 32K × 28 × 1024 / (12 GB/s) — drops to ~5 tok/s
        notes: |
          Borderline interactive at 7.4 tok/s at short context. Above ~8K
          context, decode rate drops as KV streams from LPDDR — at 32K
          context, total decode ≈ 130 + 75 = 205 ms/tok ≈ 4.9 tok/s
          (at threshold). Headline demo target: keep prompts ≤ 8K for
          comfortable interactive operation.
      - name: Qwen2.5-3B (2 KV × 128 dim, 36 layers)
        weight_bytes_w4: 1_545_000_000                         # 3.09B × 0.5
        per_token_kv_bytes_layer: 256                          # 2 × 128 × 2 × 4.0/8
        per_token_kv_bytes_all_layers: 9216                    # × 36 layers
        decode_ms_at_12gbs: 129
        decode_tok_per_sec: 7.7
        kv_scratchpad_capacity_tokens_at_0_4mb: 1638           # ⌊0.4 × 1024² / 256⌋
        kv_scratchpad_capacity_tokens_at_0_5mb: 2048
        context_4k_lpddr_stream_ms_per_tok: ~3                 # 4K × 36 × 256 / (12 GB/s)
        context_32k_lpddr_stream_ms_per_tok: ~24               # 32K × 36 × 256 / (12 GB/s)
        notes: |
          Best-in-class long-context model on v2. 2 KV heads × 128 dim → KV
          per token is 4× smaller than 8-head peers. At 32K context, total
          decode ≈ 130 + 24 = 154 ms/tok ≈ 6.5 tok/s — stays above 5 tok/s
          threshold. NOTE: earlier drafts claimed "32K context fits ON-DIE
          per layer" — that was wrong (1638 tokens fit per layer at 0.4 MB,
          not 32K). The chip still serves 32K, just via LPDDR streaming
          rather than fully on-die.
      - name: Mistral-NeMo-3B (8 KV × 128 dim, 28 layers)
        weight_bytes_w4: 1_500_000_000
        per_token_kv_bytes_layer: 1024
        decode_tok_per_sec: 8.0
        kv_scratchpad_capacity_tokens_at_0_4mb: 409
        notes: |
          Comfortable interactive 8 tok/s at short context. Same KV layout
          and streaming behavior as Llama-3.2-3B.
      - name: Phi-3.5-mini (32 KV × 96 dim, 32 layers)
        weight_bytes_w4: 1_910_000_000                         # 3.82B × 0.5
        per_token_kv_bytes_layer: 3072                         # 32 × 96 × 2 × 4.0/8
        per_token_kv_bytes_all_layers: 98304
        decode_ms_at_12gbs: 160
        decode_tok_per_sec: 6.3
        kv_scratchpad_capacity_tokens_at_0_4mb: 136
        context_4k_lpddr_stream_ms_per_tok: ~33                # 4K × 32 × 3072 / (12 GB/s)
        notes: |
          KV-heavy outlier — 32 KV heads is unusual for this scale. Even at
          short context, KV streaming dominates. 4K context: ~33 ms/tok
          extra → ~5 tok/s, dropping below threshold. Phi-3.5-mini is NOT
          recommended as v2 demo target without Phi-specific quality need.
      - name: Llama-3.2-1B (8 KV × 64 dim, 16 layers)
        weight_bytes_w4: 620_000_000
        per_token_kv_bytes_layer: 512                          # 8 × 64 × 2 × 4.0/8
        decode_tok_per_sec: 19.3
        kv_scratchpad_capacity_tokens_at_0_4mb: 819
        notes: Comfortable at 19 tok/s; uses bandwidth headroom. 0.4 MB scratchpad fits ~800 tokens per layer.
      - name: hypothetical-5B (8 KV × 128 dim, 32 layers)
        weight_bytes_w4: 2_500_000_000
        per_token_kv_bytes_layer: 1024
        decode_ms_at_12gbs: 209
        decode_tok_per_sec: 4.8
        notes: At threshold at short context (just below 5 tok/s). 4-4.5B is the practical ceiling. 32K context unusable here — would drop to 3 tok/s.

# -----------------------------------------------------------------------------
# Memory hierarchy
# -----------------------------------------------------------------------------
memory_hierarchy:

  off_chip_dram:
    technology: LPDDR5X
    standard_data_rate_mbps: 8533                              # JEDEC LPDDR5X peak [C-16]
    channel_width_bits: 16                                     # x16 — half-width vs x32 mobile typical
    channels_on_die: 1
    package_capacity_gb_per_channel: 4_to_8                    # standard mobile LPDDR5X package
    total_capacity_gb: 4_to_8
    peak_bandwidth_gb_s_per_channel: 17.1                      # 8533 × 16 / 8 / 1000
    sustained_bandwidth_gb_s_planning: 12                      # ~70% of peak
    phy_ip_source: Synopsys DesignWare or Cadence Denali LPDDR5X x16
    phy_area_estimate_mm2: 1.2
    estimate: true                                             # vendor-NDA-gated; verify
    why_x16_not_wider: |
      Wider PHYs (x32, x64) consume 1.8-2.5 mm² each, breaking the 4 mm²
      budget. x16 at 1.2 mm² is the largest LPDDR5X PHY that fits while
      leaving room for compute + SRAM. See `v2_stretch_lpddr5x_x32` block
      below for the alternative.

  on_chip_sram:
    total_target_mb: 0.8                                       # corrected: was inconsistently 1.0 elsewhere; baseline at PHY=1.2 mm²
    upgrade_to_1mb_if_phy_at_1mm2_best_case: true              # PHY best-case frees +0.20 mm² → can grow scratchpad + activation
    organization: KV-dominant_minimal
    banks:
      - id: kv_scratchpad
        size_mb: 0.4                                           # baseline at PHY=1.2
        size_mb_if_phy_at_1mm2: 0.5                            # if PHY comes in best-case
        purpose: |
          Compressed KV scratchpad for current layer's hot tokens. Capacities
          at 0.4 MB with ChannelQuant at ~4 bits/value (see target_workload.
          capacity_math for the byte formula). The per-model token capacities
          below were derived for the retired 3-5B set at the pre-pivot codec and
          are TBD — pending re-derivation for ChannelQuant / Qwen2-1.5B:
            - Qwen2-1.5B (canonical target):  TBD single-layer tokens
            - Llama-3.2-3B (8 KV × 128):      TBD single-layer tokens
            - Qwen2.5-3B (2 KV × 128):        TBD single-layer tokens
          KV beyond the scratchpad streams from LPDDR5X at 12 GB/s; the extra
          ms/tok overhead at 4-32K context is likewise TBD for the new codec.
          Headline demo: keep target prompts ≤ 8K context.
        bandwidth_gb_s: 64
        latency_cycles: 1
        port_count: 1
      - id: activation_buffer
        size_mb: 0.3
        purpose: |
          FlashAttention working set + per-token QKV scratch + MLP intermediates.
          Single-session/batch-1 with FA tile=8-16 fits comfortably.
        port_count: 2
      - id: weight_stream_buffer
        size_mb: 0.05                                          # corrected: was 0.15 here, 0.05 in definitive section
        purpose: |
          Streaming staging for weights from LPDDR. At 12 GB/s × 100 ns
          first-byte = 1.2 KB minimum tile; 0.05 MB = 40× minimum, ample.
        port_count: 1
      - id: codebook_const_rom                                 # id kept for HLS continuity
        size_kb: 64
        purpose: ChannelQuant outlier-channel ROM mask, RoPE freqs, transcendental LUTs (no Lloyd-Max centroids)
        port_count: 1
    total_sram_area_mm2: 0.71                                  # 0.8 MB / 1.25 MB/mm² × 1.10 compiler overhead

  roofline_analysis:
    decode_phase:
      bytes_per_param_w4: 0.5
      arithmetic_intensity_batch_1: 4
      lpddr5x_x16_machine_balance_ops_per_byte: 11             # 0.13 TOPS / 12 GB/s
      bandwidth_bound_until_batch: ~3
      conclusion: |
        Decode is bandwidth-bound. At 12 GB/s sustained:
          1B model: 0.5 GB / 12 = 42 ms/tok = 24 tok/s
          3B model: 1.5 GB / 12 = 125 ms/tok = 8 tok/s
          4B model: 2.0 GB / 12 = 167 ms/tok = 6 tok/s
          5B model: 2.5 GB / 12 = 208 ms/tok = 4.8 tok/s (THRESHOLD)
        Compute (0.128 TOPS peak, 76.8 GOPS sustained at 60% util) has
        **1.6× headroom** over the bandwidth-bound floor — constant across
        all bandwidth-bound model sizes because compute_needed scales with
        bandwidth, not model size. (Earlier drafts of this spec said
        "3-5× headroom" — that was wrong; the bandwidth-bound floor scales
        WITH bandwidth, so headroom is constant.)
    prefill_phase:
      compute_bound: true_at_seq_len_>_32
      conclusion: |
        Prefill is compute-bound at any non-trivial prompt. 256-prompt on
        3B model: 2 × 256 × 3e9 = 1.5e12 FLOPs / 0.13 TOPS / 50% util
        = 23 sec. **Recommended interactive prompt ceiling: 64-128 tokens
        (~3-6 sec).** Same conclusion as flagship: decode-optimized.

# -----------------------------------------------------------------------------
# Functional blocks
# -----------------------------------------------------------------------------
blocks:

  - id: matrix_engine
    name: Matrix Engine (MatE) — 8×8
    function: |
      Weight-stationary primary dataflow (output-stationary alt for Q·K^T).
      INT8 × INT4 multiplier per PE producing 11-bit signed partial product;
      INT24 K-axis accumulator (sufficient for any practical reduction up to
      ~16K). Handles all GEMMs: Q/K/V projections, attention output (Q·K^T,
      softmax·V), FFN up/down, logits.
    microarchitecture:
      array_dim_pe: 8x8                                        # 64 PEs
      pe_op: INT8 × INT4 → 11-bit product (INT16 PE register) → INT24 K-axis reduction
      attention_score_mode: INT8 (Q) × per-channel-dequantized K (INT4·FP16 → FP16) → INT24 reduction  # K dequantized by KVE before scoring; no compressed-domain read path
      peak_ops_per_cycle: 128
      target_clock_mhz: 1000
      peak_tops_int8w4: 0.128
      accumulator_correction_note: |
        Earlier drafts specified "INT16 accumulator". That was a real bug:
        INT8 × INT4 → 11-bit product, summed K times needs log2(K) + 11 bits;
        for K=128 (head_dim) that's 18 bits, saturating INT16. INT24 is the
        right K-axis accumulator width and matches flagship convention.
      sizing_rationale: |
        Decode is bandwidth-bound: GOPS_needed = 2 × BW_GBs / W4_bytes
        = 2 × 11.94 / 0.5 ≈ 48 GOPS (constant across model size in BW-bound
        regime). Available 0.128 TOPS × 60% util = 76.8 GOPS → **1.6× headroom**.
        8×8 is the smallest array that meets this with margin. Earlier drafts
        claimed "30%+ headroom even at largest model" — that was a fortunate
        coincidence of phrasing; the right framing is 1.6× constant headroom.
    dataflow: weight_stationary
    quantization_support:
      - format: int8_x_int4
        primary: true
        notes: W4A8 sweet spot per ACL'25 (arXiv 2411.02355 "Give Me BF16 or Give Me Death")
      - format: int8_x_int8
        primary: false
        notes: fallback for accuracy-critical layers (logits projection)
      - format: fp16_score_after_dequant
        primary: false
        notes: Q·K^T scoring on per-channel-dequantized K (KVE emits INT4·FP16 → FP16); no compressed-domain path
    area_mm2: 0.10
    verification_tests: 50
    risk: medium

  - id: vector_unit
    name: Vector Unit (VecU) — 8-lane
    function: |
      8 lanes × 16-bit FP16/BF16. Online softmax, RMSNorm, GELU/SiLU, RoPE,
      residual add. Microcoded.
    microarchitecture:
      vector_width_lanes: 8
      lane_bit_width: 16
      ops_supported:
        - vector_add_sub_mul
        - vector_compare_max_min
        - exp_lut                                              # 64-entry LUT
        - reciprocal_sqrt_lut
        - sigmoid_lut
        - rotary_pair_rotate                                   # RoPE
      microcode_capacity: 1k_instructions
    online_softmax_specifics:
      algorithm: online softmax recurrence (Milakov & Gimelshein 2018; FlashAttention-style tiling)
      m_running_max_buffer: 8_lanes_x_16b
      l_running_sum_buffer: 8_lanes_x_16b
    area_mm2: 0.15
    verification_tests: 25
    risk: medium

  - id: kv_compression_engine
    name: KV Cache Engine (KVE) — ChannelQuant codec  [id kept for HLS continuity]
    codec_of_record: |
      ChannelQuant: per-channel INT4 K (grouped G=128, D per-channel FP16 scales)
      + per-token INT4 V (INT8 in the CQ-8 tier) + static top-k (k=2) FP16
      outlier-channel lane selected by a calibrated ROM mask; tiers
      CQ-8/CQ-4/CQ-4+; ~3.8x at ~4 bits/value. Full block RTL complete through
      Sky130 sign-off in the kv-cache-engine repo.
    function: |
      Streaming ChannelQuant compress/decompress on K and V as MatE produces
      them. Keys: buffer a G=128 key group → per-channel amax → D FP16 scales →
      INT4 codes, with the k=2 outlier channels held FP16. Values: per-token
      INT4. Unified per-channel SRAM record {tag, D×FP16 field, D×INT4 code}.
      Decompress = per-channel INT4_code · FP16_scale (+ FP16 replay for outlier
      channels); K is dequantized per-channel before the score matmul. One shared
      fp16 compute unit (scale/quant/dequant) is serialized across the D channels
      (single divide cone).
    microarchitecture:
      key_quant: per-channel INT4, grouped G=128
      key_scales: D per-channel FP16
      value_quant: per-token INT4 (INT8 in CQ-8)
      outlier_lane: static top-k (k=2) FP16 channels via calibrated ROM mask
      sram_record: unified per-channel {tag, D×FP16 field, D×INT4 code}
      shared_compute: one serialized fp16 scale/quant/dequant unit across D channels
      compression_ratio_vs_fp16: ~3.8                          # at ~4 bits/value
      bits_per_value_measured: ~4.13–4.38 (depends on head dim D)
      bypass_mode: true
    operating_modes:
      - id: channelquant_CQ8
        notes: per-token INT8 K+V
      - id: channelquant_CQ4
        primary: true
        notes: per-channel INT4 K / per-token INT4 V; ~3.8× at ~4 bits/value, near-lossless
      - id: channelquant_CQ4_plus
        notes: CQ-4 + k=2 FP16 outlier channels; HellaSwag acc_norm within ~0.4-0.8 pt of FP16 (Qwen2-0.5B/1.5B)
      - id: bypass_fp16
        compression_ratio: 1.0
        notes: debug / ablation passthrough
    area_mm2: TBD                                              # TBD (pending re-measurement for ChannelQuant at 16nm)
    power_w: TBD                                               # TBD (pending re-measurement)
    fmax_ghz: TBD                                              # TBD (pending re-measurement)
    verification_tests: 60
    risk: low                                                  # block RTL complete through Sky130 sign-off in kv-cache-engine repo

  - id: memory_subsystem_controller
    name: Memory Subsystem Controller (MSC)
    function: |
      Single LPDDR5X x16 controller; 4-port SRAM crossbar; 128-entry block
      table for KV paging. Single-session — no continuous batching, no
      Tier-3 eviction.
    microarchitecture:
      lpddr5x_controllers: 1
      sram_crossbar_ports: 4
      block_table_entries: 128
      block_size_tokens: 16
      hw_features:
        - dma_descriptor_fsm
        - simple_prefetch
        - on_demand_kv_decompress
        - request_arbitration_pq
    area_mm2: 0.18
    verification_tests: 50
    risk: medium

  - id: layer_sequencer
    name: Layer Sequencer (LSU) — minimal
    function: |
      Tiny in-order RISC + vector dispatch. 32-instruction ISA, 4K microcode,
      16×32b GPR. Loads pre-compiled schedule for one model at boot.
    area_mm2: 0.10
    verification_tests: 30
    risk: low

  - id: host_interface
    name: Host Interface (HIF) — PCIe Gen3 x1 on M.2 form factor
    function: |
      PCIe Gen3 x1 endpoint at ~1 GB/s sustained. Tokens are <1 KB; runtime
      I/O is negligible. Weight load at boot: 1.5 GB / 1 GB/s = 1.5 sec.
      JTAG via dedicated pins (separate from PCIe lanes). M.2 2280 form
      factor at PCB level — connector wires 4 lanes; on-die PHY drives x1
      only (PCIe negotiates down). Vendor IP: Synopsys DesignWare PCIe Gen3
      x1 PHY or Cadence PCIe Gen3 PHY at 16nm — both have public datasheets.
      Revised 2026-05-14 (was USB-C 2.0 in earlier drafts; see STATUS.md change-log).
    bandwidth_gb_s: 1.0
    area_mm2: 0.55
    verification_tests: 30                                     # +5 over USB-C 2.0; PCIe link training adds test surface
    risk: medium                                               # vendor IP integration; lower risk than LPDDR PHY but non-trivial

  - id: token_importance_unit
    name: Token Importance Unit (TIU) — NEW
    function: |
      Per-block attention-entropy accumulator. Updated by VecU during softmax
      (cumulative softmax weights per 16-token block). Consumed by MSC for
      eviction policy (H2O / streaming-LLM) and by KVE for per-block
      adaptive precision (high-importance blocks stay at a higher ChannelQuant
      tier, e.g. CQ-4+/CQ-8; low-importance blocks demote to CQ-4). Modeled on
      arXiv 2604.04722.
    microarchitecture:
      importance_register_per_block: 16-bit
      total_blocks_tracked: 128
      total_sram_bytes: 256
    csr_modes:
      - tiu_off
      - tiu_h2o
      - tiu_streaming_llm
      - tiu_adaptive_precision
    area_mm2: 0.03
    verification_tests: 15
    risk: low

# -----------------------------------------------------------------------------
# Top-level area accounting
# -----------------------------------------------------------------------------
top_level:
  die_area_target_mm2: 4.0
  die_area_target_mm2_basis: |
    IMEC / Europractice mini@sic 2.0 minimum block area at TSMC 16nm. Aligns
    with Muse Semiconductor 4 mm² Full Block. 2×2 mm or any X×Y summing to
    4 mm² acceptable per mini@sic 2.0 flexibility.
  area_accounting_mm2:
    # Revised 2026-05-14 (Phase 0): HIF USB-C 2.0 → PCIe Gen3 x1 (+0.25 mm²);
    # TIU added (+0.03 mm²); routing_overhead_buffer now correctly included in
    # total. Earlier drafts dropped routing_overhead from total (claimed 3.974
    # vs real 4.074) — bug fixed here.
    matrix_engine_8x8: 0.10
    vector_unit_8_lane: 0.144
    kv_compression_engine: TBD                                 # KVE (ChannelQuant) area TBD (pending re-measurement); totals below hold 0.08 as a placeholder only
    kv_compression_engine_placeholder_for_totals: 0.08        # NOT a ChannelQuant figure — placeholder so the budget arithmetic below still balances until KVE PD closes
    token_importance_unit: 0.03                                # NEW (Phase 0.3)
    memory_subsystem_controller: 0.18
    layer_sequencer: 0.10
    host_interface_pcie_gen3_x1: 0.55                          # WAS 0.30 (USB-C 2.0); revised Phase 0.1
    sram_kv_scratchpad_0_4mb: 0.35
    sram_activation_buffer_0_3mb: 0.26
    sram_weight_buffer_0_05mb: 0.05
    codebook_const_rom_64kb: 0.05
    on_chip_sram_total_subtotal: 0.71                          # 0.8 MB total (informational; not double-counted in total below)
    lpddr5x_x16_phy: 1.20
    clock_tree_and_power_grid: 0.40
    io_ring_pads_esd: 0.76
    routing_overhead_buffer: 0.10                              # included in total (Phase 0.4 fix)
    total_gross_mm2: 4.354                                     # over 4.0 budget by 0.354 mm² — uses KVE placeholder 0.08; true total TBD pending KVE re-measurement
    headroom_gross_mm2: -0.354
    die_utilization_pct_gross: 109
  area_status_after_phase_0: OVER_BUDGET_AT_BASELINE — apply recommended shrink path below
  area_sensitivity:
    phy_at_1_0mm2_best_case:
      total_with_pcie_and_tiu_mm2: 4.154                       # 4.354 − 0.20 PHY savings
      verdict: |
        Still over budget by 0.154 mm². Need additional shrinks: I/O ring to
        80 µm (-0.06) + activation buffer to 0.2 MB (-0.08) lands at 4.014 mm²,
        within 0.4% of 4.0 mm² target. This is the recommended baseline.
    phy_at_1_2mm2_planning:
      total_with_pcie_and_tiu_mm2: 4.354
      verdict: |
        Over budget by 0.354 mm². Need PHY best case OR LPDDR4X fallback OR die
        growth to 4.25 mm² (~+6% shuttle). See STATUS.md §5 LPDDR tradeoff.
    phy_at_1_5mm2_worst_case:
      total_with_pcie_and_tiu_mm2: 4.654
      verdict: |
        Does NOT fit. Options: (a) drop to LPDDR4X x16 PHY (loses 4-5B → 2.4B
        model class), (b) grow die to 4.7 mm² (~+18% shuttle cost; may exceed
        IMEC mini@sic 2.0 minimum-block-area tier), (c) accept 4.5 mm² die and
        LPDDR4X. Worst case is a real risk; the PHY quote in Q2 2026 is the
        single most important data point gating chip-level commitment.

  shrink_paths_phase_0_revised:
    # Total shrink needed: 0.354 mm² at PHY = 1.2 mm² mid-case.
    #                     0.154 mm² at PHY = 1.0 mm² best-case (recommended planning baseline).
    - id: phy_best_case_at_1_0mm2
      saves_mm2: 0.20
      condition: contingent on Q2 2026 Synopsys/Cadence vendor quote
      recommended_first: true
    - id: tighten_io_ring_to_80um
      saves_mm2: 0.06
      cost: tighter PD margins but feasible at 16nm with Sofics GPIO library tuning
      recommended_second: true
    - id: shrink_activation_buffer_to_0_2mb
      saves_mm2: 0.08
      cost: forces FA tile=8 (was 16); slower per-tile but functional. Quality-equivalent at batch 1.
      recommended_third: true
    - id: shrink_kv_scratchpad_to_0_3mb
      saves_mm2: 0.09
      cost: |
        Loses ~100 tokens on-die for 8-head models. Compensated by TIU (Phase 0.3)
        + LPDDR streaming. Acceptable if other shrinks insufficient.
    - id: drop_weight_stream_buffer_to_0_02mb
      saves_mm2: 0.03
      cost: minimal — 0.02 MB is still 16× streaming minimum at 12 GB/s × 100 ns
    - id: drop_to_lpddr4x_x16
      saves_mm2: 0.20
      cost: |
        Bandwidth halves to 6 GB/s; largest reasonable model drops from 4.8B
        to 2.4B at 5 tok/s. Use as fallback ONLY if Synopsys/Cadence LPDDR5X x16
        quote returns > 1.4 mm². See STATUS.md §5 for the full tradeoff analysis.
      not_recommended_unless_phy_quote_forces: true
    - id: grow_die_to_4_25mm2
      saves_mm2: n/a (grows area instead)
      cost: ~+6% shuttle cost (~$60-100K → ~$64-106K). Still inside IMEC mini@sic 2.0 Full Block.

  preferred_landing: |
    4.014 mm² with: PHY best case (1.0 mm²) + I/O ring tightened to 80 µm +
    activation buffer shrunk to 0.2 MB. Within 0.4% of 4.0 mm² target.
    Contingent on Q2 2026 PHY vendor quote landing ≤ 1.0 mm²; else fall back
    to grow_die_to_4_25mm2 or LPDDR4X path.

# -----------------------------------------------------------------------------
# Quantization strategy
# -----------------------------------------------------------------------------
quantization_strategy:
  weights:
    primary: int4_per_channel_groupwise
  activations:
    primary: int8_per_token_dynamic
  kv_cache:
    primary: channelquant_CQ4                                  # ChannelQuant: per-channel INT4 K + per-token INT4 V + static top-k FP16 outlier lane
    tiers: [CQ-8, CQ-4, CQ-4+]
    near_lossless_tier: channelquant_CQ4_plus
    bypass: fp16
  attention_compute:
    primary: int8_q_x_fp16_dequantized_k_with_fp16_softmax_accum
    per_channel_dequant_scoring: |
      The KVE dequantizes K per-channel (INT4_code · FP16_scale, + FP16 replay
      for the k=2 outlier channels) before scoring — there is no compressed-
      domain / raw-index read path. Q (INT8) · dequantized K → INT24 reduction
      along head_dim → softmax in VecU (FP16). softmax · V is the same pattern:
      V is dequantized per-token (INT4 · scale) before the MatE multiply;
      accumulator FP16.

# -----------------------------------------------------------------------------
# Performance targets
# -----------------------------------------------------------------------------
performance_targets:
  # PENDING RE-DERIVATION: the per-model decode-throughput tables below were
  # derived for the retired 3-5B example set (and the pre-pivot codec). The
  # canonical target is now up to 1.5B parameters, validated on Qwen2-1.5B. The
  # ≤2B rows still bound the target well, but the 3-5B rows and any codec-
  # dependent capacity notes are TBD — pending re-derivation for ChannelQuant /
  # Qwen2-1.5B. Do not read the 3-5B rows as the target.

  decode_throughput_table_lpddr5x_x16:
    # Verified 2026-04-26 by 2026-05-14 roofline analysis
    # All numbers derived: weight_GB / 11.94 GB/s sustained = ms/token
    # Sustained = 70% of peak (LPDDR5X-8533 x16 peak = 17.07 GB/s)
    derivation_basis: weight_GB / 11.94_GB_s_sustained = ms/token; 1000/ms = tok/s
    targets:
      - model: SmolLM2-360M
        params_billion: 0.36
        weight_GB_w4: 0.18
        ms_per_tok: 15.1
        tok_per_sec: 66.4
        verdict: very_comfortable_overkill
      - model: Qwen2.5-0.5B
        params_billion: 0.5
        weight_GB_w4: 0.25
        ms_per_tok: 20.9
        tok_per_sec: 47.8
        verdict: very_comfortable
      - model: Llama-3.2-1B
        params_billion: 1.24
        weight_GB_w4: 0.62
        ms_per_tok: 51.9
        tok_per_sec: 19.3
        verdict: very_comfortable
      - model: TinyLlama-1.1B
        params_billion: 1.1
        weight_GB_w4: 0.55
        ms_per_tok: 46.0
        tok_per_sec: 21.7
        verdict: very_comfortable
      - model: Gemma-2-2B
        params_billion: 2.0
        weight_GB_w4: 1.0
        ms_per_tok: 83.7
        tok_per_sec: 11.9
        verdict: comfortable
      - model: Llama-3.2-3B
        params_billion: 3.21
        weight_GB_w4: 1.605
        ms_per_tok: 134.4
        tok_per_sec: 7.4
        verdict: borderline_interactive                         # (was claimed 8 — corrected)
      - model: Qwen2.5-3B
        params_billion: 3.09
        weight_GB_w4: 1.545
        ms_per_tok: 129.3
        tok_per_sec: 7.7
        verdict: borderline_interactive_short_context__best_long_context_target
        notes: |
          2 KV × 128 dim layout — on-die token capacity per layer at ~4
          bits/value (ChannelQuant) is TBD (pending re-derivation for the new
          codec). Structurally still 4× the on-die capacity of 8-head peers.
          32K context serviceable via LPDDR5X streaming (per-tok overhead TBD).
          Earlier drafts claimed "32K fits ON-DIE per layer" — that was wrong;
          chip serves 32K but streamed, not on-die.
      - model: Mistral-NeMo-3B
        params_billion: 3.0
        weight_GB_w4: 1.5
        ms_per_tok: 125.6
        tok_per_sec: 8.0
        verdict: comfortable_interactive                        # the genuine sweet spot
      - model: Phi-3.5-mini
        params_billion: 3.82
        weight_GB_w4: 1.91
        ms_per_tok: 159.9
        tok_per_sec: 6.3
        verdict: borderline_interactive
      - model: hypothetical_4B
        params_billion: 4.0
        weight_GB_w4: 2.0
        ms_per_tok: 167.4
        tok_per_sec: 6.0
        verdict: borderline_interactive
      - model: hypothetical_5B
        params_billion: 5.0
        weight_GB_w4: 2.5
        ms_per_tok: 209.3
        tok_per_sec: 4.8
        verdict: at_threshold (just below 5 tok/s)
      - model: Mistral-7B
        params_billion: 7.24
        weight_GB_w4: 3.62
        ms_per_tok: 303.0
        tok_per_sec: 3.3
        verdict: below_threshold_at_W4_needs_W3_or_v2_stretch
      - model: Llama-3.1-8B
        params_billion: 8.03
        weight_GB_w4: 4.01
        ms_per_tok: 336.1
        tok_per_sec: 3.0
        verdict: below_threshold_use_v2_stretch_lpddr5x_x32

  compute_headroom_check:
    # Verified by lambda_v2_audit.py: at bandwidth-bound decode,
    # GOPS_needed = 2 × bandwidth_GBs / W4_bytes_per_param = constant ≈ 48 GOPS
    # GOPS_available = peak_TOPS × util × 1000 = 0.128 × 0.6 × 1000 = 76.8 GOPS
    headroom_factor: 1.6
    notes: |
      Compute headroom is 1.6× across the entire bandwidth-bound model range
      (constant because compute_needed scales with bandwidth, not model size).
      NOT 3-5× as earlier claimed. 1.6× is adequate margin for production but
      tighter than originally suggested. Compute is NOT the bottleneck at any
      v2 baseline operating point; bandwidth is the entire story.

  largest_reasonable_model_summary:
    primary_target: up to 1.5B parameters, validated on Qwen2-1.5B
    primary_target_perf: 6-8 tok/s comfortable interactive
    legacy_target_pre_pivot: 3-4B class (retired 2026-06-22; perf figures TBD, pending re-derivation)
    above_ceiling_with_aggressive_quant: |
      Larger classes with W3 quantization could reach ~5 tok/s — a stretch
      experiment, not the target. W3 quality would need evaluation against
      RotateKV / QuaRot W3 results. (All figures here are TBD — pending
      re-derivation for the ChannelQuant / Qwen2-1.5B target.)

  prefill_latency_128_prompt_3B:
    target_ms: 6_000_to_9_000
    derivation: 2 × 128 × 3e9 = 7.7e11 FLOPs / 0.13 TOPS / 50% util = 12 sec → realistic 6-9 sec
    use_case: comfortable interactive prompt size

  prefill_latency_64_prompt_3B:
    target_ms: 3_000_to_5_000
    use_case: interactive_quick

  power_budget:
    # Verified by 2026-05-14 power budget
    target_watts_typical: 2.6                                  # decode bandwidth-bound, 50% MatE util (revised 2026-05-14 for PCIe + TIU)
    target_watts_peak: 3.3                                     # prefill burst, 100% MatE util
    target_watts_basis: |
      Verified breakdown at LPDDR5X x16, 12 GB/s sustained (revised 2026-05-14
      for PCIe Gen3 x1 HIF replacing USB-C 2.0, and TIU block addition):
        LPDDR PHY+DRAM (7.5 mW/Gbps × 96 Gbps = 720 mW)        0.72 W
        MatE 64 PEs at 50% util (5 W/TOPS × 0.128 × 0.5)       0.32 W
        VecU 8 lanes (0.04 W/lane × 8 × 0.5 util)              0.16 W
        SRAM 0.8 MB at 50% util (0.4 W/MB × 0.8 × 0.5)         0.16 W
        KVE (ChannelQuant)                                     TBD (pending re-measurement; 0.05 W held as placeholder in totals)
        TIU (256 B SRAM + accumulator, NEW)                     0.01 W
        MSC + LSU                                               0.20 W
        HIF (PCIe Gen3 x1, REVISED from 0.10 W USB-C)           0.30 W
        Whole-chip leakage at 16nm 0.8V (~0.7 W for 4 mm²)      0.70 W
        TOTAL TYPICAL DECODE                                   ~2.62 W
        TOTAL PEAK PREFILL (100% util MatE+VecU, 80% SRAM)     ~3.31 W
    sources:
      - Samsung/Micron LPDDR5X product briefs (7.5 mW/Gbps system)
      - 16nm dense INT8 systolic energy ~5 W/TOPS (sparse can be 2-4x better)
      - 16nm 0.8V 4 mm² leakage estimate from TSMC FinFET reliability docs
    estimate: true                                             # post-silicon characterization needed
    margin_vs_fanless_envelope: |
      M.2 2280 slot delivers 3.3 V at ~3 A = ~10 W per M.2 spec; leaves
      ~6 W headroom even at peak 3.3 W chip operation. Fanless / battery
      deployment feasible at ~2.6 W typical. Power grew ~0.2 W vs the prior
      USB-C 2.0 spec (PCIe Gen3 x1 PHY + controller draws ~0.30 W vs USB
      2.0's ~0.10 W) — acceptable given the form-factor + latency wins.

  energy_per_token_3B_at_7_to_8_tok_s:
    target_mj_per_token: ~325                                  # verified: 2.6 W × 125 ms = 325 mJ
    derivation: 2.6 W typical × 125-135 ms/tok (3B class) = 320-350 mJ/token
    comparable_baselines:
      x86_cpu_3b_inference: ~3000_to_5000_mj_per_token         # 30-50 W × 100 ms
      apple_neural_engine_3b: ~200_mj_per_token                # estimated; closed-source
      qualcomm_hexagon_npu_3b: ~250_mj_per_token               # estimated; closed-source
    notes: |
      v2 is **9-15× better than CPU-only inference** at 3B class — the main
      pitch (was claimed 6-10× with overstated 4 W power; verified 2.6 W
      makes the win larger). Closed-source mobile NPUs (Apple ANE / Qualcomm
      Hexagon) remain 1.5-2× better thanks to integration tightness; v2 is
      the open-source academic standalone version of the same workload.

  peak_compute_int8w4_tops: 0.128

