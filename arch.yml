# =============================================================================
# Lambda — Standalone end-to-end transformer accelerator (4 mm² die)
# =============================================================================
# CODEC-OF-RECORD NOTE: the KV-cache compression codec is ChannelQuant
# (per-channel INT4 keys grouped G=128 + per-token INT4 values + static top-k
# FP16 outlier-channel lane; tiers CQ-8/CQ-4/CQ-4+; ~3.8x KV compression at
# ~4 bits/value, near-lossless). A newer CQ-3-rot tier (merged 2026-07-20; idea:
# Abhiram Bandi + Chaithu Talasila) spins each per-token VALUE row by a fixed
# Walsh-Hadamard transform before quant, dropping values to a flat 3 bits/value
# (~4.8x, near-lossless, keys untouched); reference bit-exact to the RTL
# (348,160/348,160 on real Qwen), value RTL on the kv-cache-engine `rtl` branch.
# The block is the KV Cache Engine (KVE); its full block RTL (complete through
# Sky130 sign-off) lives on the kv-cache-engine `rtl` branch (130nm Sky130 proxy). Datapath serializes one shared fp16 compute unit (scale/quant/dequant)
# across the D channels; keys are dequantized per-channel (INT4_code · FP16_scale,
# plus FP16 replay for outlier channels) before the score matmul. Physical PD
# numbers for the KVE at 16nm (area/power/Fmax) are TBD (pending re-measurement
# for ChannelQuant). TurboQuant (arXiv 2504.19874) remains a cited prior work
# only (see citations.C-01), not the current codec; the pure TurboQuant history
# is preserved on the legacy/turboquant branch.
#
# Canonical architecture spec. This is the single source of truth for the chip.
#
# Lambda is a STANDALONE end-to-end mini-accelerator: includes a LPDDR5X x16
# channel (~12 GB/s sustained), a tight 8×8 MatE / 8-lane VecU / KVE
# compute fabric, and runs the entire transformer decode loop on-die.
#
# **Largest reasonable model: up to 1.5B parameters, validated on Qwen2-1.5B.**
# The headline win: at 4 mm² Lambda serves this model class standalone,
# because we trade bandwidth depth (1× LPDDR5X x16 at 12 GB/s vs the abandoned
# flagship's 2× LPDDR5X x64 at 100 GB/s) for area we can afford.
#
# A v2-stretch option (LPDDR5X x32 PHY) is documented at the bottom of this
# file: pushes the largest reasonable model to 7-8B at 5 tok/s, but compute-
# bottlenecked rather than bandwidth-bottlenecked, and forces near-zero
# on-die KV scratchpad. Higher risk; documented for evaluation.
#
# Tape-out via IMEC / Europractice mini@sic 2.0 at TSMC 16nm FinFET (N16FFC), $60-100K
# shuttle range. Earlier candidates "Lambda v1" (coprocessor) and "Lambda v3"
# (all-SRAM 2-10M-param) are retired; this file is the only chip target.
# Iteration history lives in STATUS.md.
# =============================================================================

metadata:
  project: Longhorn Silicon
  chip_codename: Lambda
  arch_id: Lambda
  arch_name: Lambda — standalone ≤1.5B-parameter transformer accelerator at 4 mm² (validated on Qwen2-1.5B)
  document: arch.yml
  version: 0.3-clean                                           # after 2026-05-14 audit + bug fixes
  created: 2026-04-26
  audited: 2026-05-14                                          # KV math, MatE accumulator, headroom claims (KVE PD numbers TBD, pending re-measurement for ChannelQuant)
  author: Longhorn Silicon Architecture Team (UT Austin)
  classification: CONFIDENTIAL — Internal Use Only
  status: canonical_arch_spec
  one_line_summary: >
    Standalone end-to-end transformer accelerator at 4 mm² with LPDDR5X x16,
    8×8 MatE, KVE (ChannelQuant KV codec), 0.8 MB SRAM. Targets up to 1.5B
    parameters, validated on Qwen2-1.5B. Serves this model class standalone
    in 1/6 the area and 1/5 the cost of the abandoned 25 mm² flagship.
  companions:
    - STATUS.md                                    # iteration history, open questions, decisions
    - dataflow_walkthrough.md                      # unit-by-unit teaching doc
    - floorplan.html                               # visual floorplan + area accounting
    - src/                                         # HLS C++ implementation (Cadence Stratus)

# =============================================================================
# DEFINITIVE FEATURE + BLOCK LIST — what v2 actually is
# =============================================================================
# Single canonical answer to "list everything in Lambda v2." Every value here
# verified by arch.yml audit log (2026-05-14) against published
# references. If a number disagrees with elsewhere in this file, THIS section
# is authoritative.

definitive_features_and_blocks:

  what_v2_is_in_one_sentence: |
    A standalone open-source 4 mm² transformer-decoder ASIC at TSMC 16nm FinFET
    (N16FFC) that runs up to 1.5B-parameter W4A8 LLMs (validated on Qwen2-1.5B)
    at 6-8 tok/s decode in a ~2.6-3.3 W envelope, with ChannelQuant KV
    compression in silicon (KVE block; per-channel INT4 K + per-token INT4 V +
    static top-k FP16 outlier lane; ~3.8x at ~4 bits/value). Plugs into any
    modern laptop or dev board via PCIe Gen3 x1 on M.2 2280 form factor.
    Long-context support up to 32K via LPDDR streaming: low-KV-head models
    stay above 5 tok/s even at 32K; higher-KV-head models drop toward
    threshold past 16K.

  # Top-level naming convention follows the canonical four-block taxonomy:
  # Block 1 Attention Compute Unit (ACU), Block 2 KV Cache Engine (KVE,
  # ChannelQuant codec), Block 3 Token Importance
  # Unit (TIU), Block 4 Memory Hierarchy Controller (MHC). Lambda's finer
  # internal decomposition (MatE/VecU/KVE/MSC/LSU/HIF/TIU) is preserved; the
  # MSC (Memory Subsystem Controller) here maps to the canonical MHC.
  compute_unit_grouping:
    ACU:                                                       # Block 1 — Attention Compute Unit (umbrella)
      members: [MatE, VecU, KVE]                               # KVE (ChannelQuant) = Block 2
      purpose: All compute operations — dense GEMMs, attention scoring, online softmax, RoPE, RMSNorm, KV compression
      area_mm2: TBD                                            # 0.10 (MatE) + 0.144 (VecU) + KVE(TBD, pending re-measurement for ChannelQuant); sum TBD until KVE PD closes
    MSC:                                                       # Memory Subsystem Controller — maps to canonical Memory Hierarchy Controller (MHC, Block 4)
      purpose: LPDDR5X x16 controller + 4-port SRAM crossbar + 128-entry block table + sparse-blocked indexing + TIU read interface
      area_mm2: 0.18
    LSU:                                                       # Layer Sequencer
      purpose: 32-instruction in-order RISC walking the pre-compiled model schedule
      area_mm2: 0.10
    HIF:                                                       # Host Interface — PCIe Gen3 x1 on M.2 form factor (revised from USB-C 2.0 on 2026-05-14)
      purpose: PCIe Gen3 x1 endpoint at ~1 GB/s; CSR + microcode load + token I/O; JTAG on dedicated pins
      area_mm2: 0.55
    TIU:                                                       # Token Importance Unit (new 2026-05-14; modeled on arXiv 2604.04722)
      purpose: Per-block attention-entropy accumulator driving adaptive-precision KV + H2O-style eviction
      area_mm2: 0.03

  hardware_blocks:
    # Seven-block transformer-accelerator pattern, scaled to 4 mm²
    # (MatE/VecU/KVE under ACU umbrella + MSC + LSU + HIF + TIU)
    - id: MatE
      name: Matrix Engine — 8×8 heterogeneous INT8×INT4 + FP16 weight-stationary systolic
      function: |
        All dense GEMMs in the transformer: Q/K/V projections, attention output,
        FFN up/down, logits projection. Also runs Q·K^T attention scoring in
        output-stationary mode. Under ChannelQuant, K is dequantized per-channel
        by the KVE (INT4_code · FP16_scale, + FP16 replay for outlier channels)
        before the score matmul — there is no compressed-domain / raw-index read
        path. The attention P·V (and optionally Q·K^T) runs at INT8 OR FP16,
        selected PER TILE by the ACU precision controller.
      pe_count: 64
      pe_op_weight_matmul: INT8 (act) × INT4 (wt) → 11-bit product → INT24 K-axis accumulator
      pe_op_attention_score: INT8 (Q) × dequantized K (per-channel INT4·FP16 → FP16) → INT24 K-axis accumulator
      pe_op_attention_pv: |
        P·V accumulation runs at INT8 (softmax probs × INT8 V) OR FP16
        (FP16 × FP16 → FP32 accumulate), selected PER TILE by the ACU precision
        controller. The FP16 path is a heterogeneous MAC mode in the same array,
        matching the attention-compute-unit block's MAC array (mac_array_ref).
        ACCUMULATOR WIDTH: the INT8 P·V path reduces over the TOKEN dimension, so
        its accumulator scales with context length, NOT hidden dim — it needs INT32,
        not the INT24 used for W4A8 GEMMs (see accumulator_rationale, re-derived
        2026-07-20 on Qwen2-1.5B). FP32 for the FP16 tiles.
      precision_control: |
        Per-tile INT8/FP16 gate from the ACU precision controller
        (attention-compute-unit repo): max(|s|)·N > 10·sum(|s|) → FP16, else
        INT8 (precision_controller_ref.py, 143/143 bit-exact vs RTL). Weight / FFN
        GEMMs stay W4A8 (INT8×INT4); only the attention tiles the gate flags
        escalate to FP16. This COMMITS the FP16 MAC path and resolves the earlier
        "no FP16 path in MatE" reconciliation item (STATUS §7); decided 2026-07-18.
        Area/power delta of the FP16 mode is TBD (pending re-synthesis).
      accumulator_rationale: |
        The array carries TWO integer accumulator widths, because the two integer
        reduction axes have very different lengths:

        (A) W4A8 GEMM + Q·Kᵀ scoring — reduce over the HIDDEN/HEAD dim.
        INT8 × INT4 = 7-bit signed × 3-bit signed = 10-bit signed product
        (max |−128 × −8| = 1024). Reduction over FFN hidden dim up to ~4096 needs
        log2(4096) + 10 = 22 bits signed, so INT24 is correct here. INT16 is NOT
        enough — it saturates after ~64 products. (An earlier draft said "INT16";
        that was wrong.) Inside each PE an INT16 register holds the cycle-by-cycle
        partial product before it walks down the column.

        (B) INT8 P·V — reduce over the TOKEN dim → width scales with CONTEXT LENGTH.
        Re-derived 2026-07-20 on Qwen2-1.5B (analysis/pv_accumulator_width.py in the
        attention-compute-unit repo). P is quantized per-query-row to INT8
        ([0,127]), V per-token to INT8 ([-127,127]); acc[q,d] = Σ_t P_int·V_int over
        the causal prefix. Worst case (maximally FLAT causal row of length L: every
        P_int ≈ 127) is 127·127·L = 16129·L → 14 + ceil(log2 L) bits signed:
          L=520 → 23b (INT24 limit) ; L=4096 → 27b ; L=133k → 31b.
        So INT24 guarantees no P·V overflow only to ~520 tokens; INT32 guarantees it
        to ~133k tokens. EMPIRICALLY on real Qwen2-1.5B the accumulator stays at ~2^21
        (21b signed) and does NOT grow with context (599k@1k, 610k@2k, 711k@4k) —
        real softmax is peaky (the same attention concentration H2O exploits), so
        INT24 works in PRACTICE. But a corner-case flat tile silently corrupts an
        attention output, so the P·V accumulator is specced INT32 for guaranteed
        correctness across arbitrary distributions at real context lengths.

        DECISION: INT24 for reduction-over-hidden-dim (W4A8 GEMM, Q·Kᵀ); INT32 for
        the INT8 P·V reduction-over-tokens path; FP32 for the FP16 tiles. Resolves the
        MatE README open question "INT32 vs INT24 for headroom" — it is not headroom,
        it is a hard requirement on the token-reduction axis.
      peak_tops: 0.128                                         # 64 × 2 ops × 1 GHz
      sustained_gops_at_60pct_util: 76.8
      area_mm2: 0.10
      power_w_at_50pct_util: 0.32
      key_decisions:
        - INT24 accumulator for hidden-dim reductions (W4A8 GEMM, Q·Kᵀ); INT32 for the
          INT8 P·V token-reduction path (context-scaled); FP32 for FP16 tiles. INT16 was a spec error.
        - Weight-stationary primary dataflow (output-stationary CSR alt for Q·K^T)
        - 1.6× compute headroom over bandwidth-bound floor across all reasonable models
        - K dequantized per-channel by KVE (INT4·FP16) before Q·K^T scoring (no compressed-domain read path)
        - Heterogeneous INT8 + FP16 MAC — attention P·V routes per-tile via the ACU precision controller (FP16 for peaked tiles, INT8 otherwise); weight/FFN GEMMs stay INT8×INT4. Committed 2026-07-18, resolving the "no-FP16-path" reconciliation (STATUS §7); the precision controller + MAC array RTL are in the attention-compute-unit repo (Sky130-signed-off).

    - id: VecU
      name: Vector Unit — 8-lane SIMD with online softmax
      function: |
        Programmable SIMD for online softmax (Milakov & Gimelshein 2018 recurrence; FlashAttention-style tiling), RMSNorm,
        SiLU/GELU, RoPE pair-rotation, residual add, sampling.
      lanes: 8
      lane_bit_width: 16                                       # FP16/BF16 accumulate
      microcode_capacity: 1k_instructions
      transcendental_luts: [exp_64entry, rsqrt_64entry, sigmoid_64entry]
      area_mm2: 0.144
      power_w: 0.16

    - id: KVE                                                  # Block 2 — KV Cache Engine
      name: KV Cache Engine (KVE) — ChannelQuant codec
      codec_of_record: |
        ChannelQuant: per-channel INT4 keys (grouped, G=128) + per-token INT4
        values + static top-k (k=2) FP16 outlier-channel lane selected by a
        calibrated ROM mask. Tiers: CQ-8, CQ-4, CQ-4+. ~3.8x KV compression at
        ~4 bits/value (measured bits/value ≈ 4.13–4.38 depending on head dim D),
        near-lossless (HellaSwag acc_norm within ~0.4-0.8 pt of FP16 at CQ-4+ on
        Qwen2-0.5B/1.5B). Recipe follows KIVI (ICML 2024) / KVQuant (2024);
        Longhorn's contribution is the streaming silicon implementation. Full
        block RTL is complete through Sky130 sign-off in the kv-cache-engine repo.
      function: |
        Streaming ChannelQuant compress/decompress on K and V as MatE produces
        them. Keys: buffer a G=128 key group, take per-channel amax, derive D
        per-channel FP16 scales, quantize to INT4; the top-k (k=2) outlier
        channels selected by the ROM mask are held as FP16. Values: per-token
        INT4 (INT8 in the CQ-8 tier). Unified per-channel SRAM record
        {tag, D×FP16 field, D×INT4 code}. Decompress = per-channel
        INT4_code · FP16_scale (+ FP16 replay for the outlier channels); keys
        are dequantized per-channel before the score matmul. The datapath
        serializes one shared fp16 compute unit (scale / quant / dequant) across
        the D channels — a single divide cone.
      key_quant: per-channel INT4, grouped G=128, D per-channel FP16 scales
      value_quant: per-token INT4 (INT8 in CQ-8 tier)
      outlier_lane: static top-k (k=2) FP16 outlier channels via calibrated ROM mask
      sram_record: unified per-channel {tag, D×FP16 field, D×INT4 code}
      compression_ratio_vs_fp16: ~3.8                          # at ~4 bits/value
      bits_per_value_measured: |
        ≈ 4.13–4.38 depending on head dim D (e.g. D=64 ≈ 4.19/4.38,
        D=128 ≈ 4.13/4.22). Not a fixed codebook bpe.
      tiers:
        - CQ-8 (per-token INT8 K+V)
        - CQ-4 (per-channel INT4 K / per-token INT4 V) — primary
        - CQ-4+ (CQ-4 + k=2 FP16 outlier channels) — near-lossless
        - bypass_fp16 (debug / ablation; 1× compression)
      area_mm2: TBD                                            # TBD (pending re-measurement for ChannelQuant at 16nm)
      power_w: TBD                                             # TBD (pending re-measurement for ChannelQuant at 16nm)
      fmax_ghz: TBD                                            # TBD (pending re-measurement for ChannelQuant at 16nm)
      research_significance: |
        First-silicon streaming implementation of the ChannelQuant KV codec
        (KVE block) — per-channel INT4 K + per-token INT4 V + static top-k FP16
        outlier lane, recipe following KIVI (ICML 2024) / KVQuant (2024).
        TurboQuant (arXiv 2504.19874) remains cited prior work only; the pure
        TurboQuant history is preserved on the legacy/turboquant branch.

    - id: MSC
      name: Memory Subsystem Controller — single-channel
      function: |
        LPDDR5X x16 controller; 4-port SRAM crossbar (MatE, VecU, KVE, host);
        128-entry block table for vLLM-compatible KV paging; DMA descriptor
        engine; on-demand KVE per-channel dequant trigger for cold-page hits.
      lpddr_channels: 1
      sram_crossbar_ports: 4
      block_table_entries: 128                                 # 16 tokens/block × 128 = 2K-token KV pages
      hw_features:
        - dma_descriptor_fsm
        - simple_prefetch
        - on_demand_kv_decompress
        - request_arbitration_priority_queue
      explicitly_NOT_supported:
        - continuous_batching                                  # single-session chip
        - tier3_host_dram_eviction                             # no host-side KV swap path
        - prefix_sharing_across_sessions
      area_mm2: 0.18
      power_w: 0.15

    - id: LSU
      name: Layer Sequencer — minimal in-order RISC
      function: |
        Walks pre-compiled model schedule. Dispatches MatE GEMMs, KVE
        compress/decompress, VecU softmax/RMSNorm/RoPE, DMA prefetches.
        Loaded at boot via host iface.
      isa: 32-bit fixed-width, 32 instructions
      registers_general_purpose: 16x32b
      microcode_capacity: 4k_instructions                      # one model schedule fits
      issue_width: 1_scalar + 1_vector + 1_dma per cycle
      area_mm2: 0.10
      power_w: 0.05

    - id: HIF
      name: Host Interface — PCIe Gen3 x1 on M.2 form factor
      function: |
        Boot-loads weights from host into LPDDR5X (1.5 sec for 3B model at 1 GB/s);
        receives prompts; streams generated tokens. JTAG via dedicated pins for
        post-silicon debug. CSR access for chip configuration and microcode load.
      protocol: PCIe Gen3 x1 (~1 GB/s sustained; ~8 Gbps × 8b/10b coding)
      form_factor: M.2 2280 (compact card form factor; standard slot on modern laptops + dev boards)
      m2_connector_lanes_wired: 4                              # M.2 spec wires 4 lanes
      lanes_active_on_die: 1                                   # save area; PCIe negotiates x1 cleanly
      doorbell_queue_depth: 16
      sustained_bandwidth_gb_s: 1.0
      bandwidth_basis: |
        Weight load at boot: 1.5 GB / 1 GB/s = 1.5 sec (one-time). Runtime token
        I/O: <1 KB per token × 8 tok/s = 4 KB/s → 250,000× headroom. PCIe Gen3
        x1 is chosen for: (a) bandwidth >> need without wasting area on x2/x4,
        (b) standard M.2 form factor enables plug-and-play on any modern laptop,
        (c) vendor IP at 16nm has public datasheets (Synopsys DesignWare PCIe
        Gen3 x1, Cadence PCIe Gen3 PHY) — unlike LPDDR5X PHY which is NDA-thin.
      scan_chain: true                                         # JTAG on dedicated pins (separate from PCIe)
      area_mm2: 0.55                                           # +0.25 over USB-C 2.0; revised 2026-05-14
      area_breakdown:
        pcie_gen3_x1_phy_vendor_ip: 0.35
        controller_csr_doorbell: 0.20
      power_w: 0.30                                            # +0.20 over USB-C 2.0
      why_not_x4: |
        PCIe Gen3 x4 PHY ~1.0-1.3 mm² at 16nm doesn't fit at 4 mm² alongside
        LPDDR5X x16 PHY (1.2 mm²) + SRAM (0.71 mm²) + compute. x1 gives ~3×
        more bandwidth than weight-load actually needs, at 0.55 mm² total.
      why_not_usbc:
        - USB-C 2.0 weight-load latency (25 sec) is annoying for development iteration
        - PCIe natively integrates with host OS as an inference accelerator (e.g., NVMe-like driver pattern)
        - M.2 form factor is the modern target for compact inference cards (Coral M.2, Hailo-8, etc.)

    - id: TIU
      name: Token Importance Unit — adaptive-precision KV driver (NEW 2026-05-14)
      function: |
        Per-block attention-entropy accumulator that drives two downstream
        decisions: (1) MSC eviction policy (H2O-style heavy-hitter retention
        when scratchpad fills), (2) KVE per-block precision tier (high-importance
        blocks stay at a higher ChannelQuant tier, e.g. CQ-4+/CQ-8;
        low-importance blocks demote to CQ-4). Modeled on arXiv 2604.04722
        "Adaptive KV-Cache Quantization for Lightweight On-Device LLMs".
      microarchitecture:
        importance_register_per_block: 16-bit
        total_blocks_tracked: 128                              # matches MSC block table
        importance_sram_bytes: 256                             # 128 × 2 B
        update_path: VecU softmax → TIU accumulator (per attention pass)
        consumer_paths:
          - MSC.eviction_policy (compare block importance to threshold register)
          - KVE.per_block_precision_mode (look up block's importance bucket → CQ tier)
      csr_modes:
        - tiu_off (no importance tracking; pure FIFO eviction)
        - tiu_h2o (heavy-hitter retention)
        - tiu_streaming_llm (recent + sink tokens)
        - tiu_adaptive_precision (drive KVE ChannelQuant tier per block)
      area_mm2: 0.03                                           # 256 B SRAM + comparator + accumulator + threshold reg
      power_w: 0.01
      verification_tests: 15
      research_significance: |
        Real H2O / TOVA / Scissorhands-style adaptive KV retention claimed
        on-silicon. Compounds with ChannelQuant for an additional 1.3-1.7×
        effective compression on long contexts without quality loss. No
        closed-source NPU does this today. (The 1.3-1.7× compounding figure was
        derived for the pre-pivot codec; TBD — pending re-derivation for
        ChannelQuant / Qwen2-1.5B.)
      naming_credit: |
        TIU naming convention adopted from Chaithu Talasila's attention-compute-
        unit framework (LonghornSilicon/attention-compute-unit); the
        block design here departs from his draft and is grounded in
        arXiv 2604.04722. See docs/reconciliation_chaithu.md.

    - id: on_chip_sram
      name: On-chip SRAM — 4 banks, 0.8 MB total (KV-dominant)
      banks:
        - id: kv_scratchpad
          size_mb: 0.4
          purpose: |
            Compressed KV staging for current layer's hot tokens. At 0.4 MB
            with ChannelQuant at ~4 bits/value and KV byte formula
            kv_heads × head_dim × 2 (K+V) × bits_per_value/8. The per-model
            token-capacity figures below were derived for the retired 3-5B
            example set at the pre-pivot codec — TBD (pending re-derivation for
            ChannelQuant / Qwen2-1.5B):
              Llama-3.2-3B   (8 KV × 128):  TBD single-layer tokens
              Qwen2.5-3B     (2 KV × 128):  TBD tokens
              Qwen2-1.5B     (canonical target): TBD tokens
            Older tokens stream from LPDDR5X — see streaming_penalty in
            target_workload.capacity_math for ms/token overhead at 4-32K
            context (also TBD for ChannelQuant / Qwen2-1.5B). This block was the
            source of a 2× capacity overstatement in v0.2 drafts (K+V doubling
            and bpe both wrong); corrected before the pivot.
          ports: 1
        - id: activation_buffer
          size_mb: 0.3
          purpose: |
            FlashAttention working set + per-token QKV scratch + MLP intermediates.
            FA tile=8-16 at batch 1 fits comfortably.
          ports: 2                                             # read-modify-write
        - id: weight_stream_buffer
          size_mb: 0.05
          purpose: |
            Tiny streaming staging FIFO. At 12 GB/s × 100 ns first-byte =
            1.2 KB minimum tile. 0.05 MB = 40× streaming minimum — ample.
          ports: 1
        - id: codebook_const_rom                               # id kept for HLS continuity
          size_kb: 64
          purpose: |
            ChannelQuant calibration constants — the static top-k (k=2) outlier-
            channel mask ROM, RoPE freq table (~512 bytes), and exp/sigmoid/rsqrt
            transcendental LUTs (~32 KB total). (No Lloyd-Max centroids: the
            ChannelQuant codec of record is not codebook-based.)
          ports: 1                                             # read-only
      total_size_mb: 0.8
      total_area_mm2: 0.71

    - id: lpddr5x_x16_phy
      name: LPDDR5X x16 PHY — vendor IP
      function: Physical-layer interface to off-chip LPDDR5X-8533 package
      vendor: Synopsys DesignWare or Cadence Denali (selected by quote in Q2 2026)
      data_rate_mbps: 8533
      bus_width_bits: 16
      peak_bandwidth_gb_s: 17.07
      sustained_bandwidth_gb_s: 11.94                          # 70% of peak
      area_mm2: 1.20                                           # estimate; vendor NDA-gated
      area_mm2_uncertainty: ±0.3 mm²                           # 1.0 best / 1.5 worst case
      power_w_at_12gbs_sustained: 0.72
      power_basis: 7.5 mW/Gbps (LPDDR5X spec, 25% better than LPDDR5)
      validation: OPENEDGES has shipped LPDDR5/4 PHY in silicon at 14/16/22 nm

  area_summary_mm2:
    # Revised 2026-05-14: HIF USB-C 2.0 → PCIe Gen3 x1 (+0.25); TIU added (+0.03);
    # routing buffer now correctly included in total (was previously dropped — see audit).
    matE_8x8: 0.10
    vecU_8_lane: 0.144
    kve: TBD                                                   # KVE (ChannelQuant) area TBD; total_gross below holds 0.08 as placeholder
    tiu: 0.03                                                  # NEW
    msc: 0.18
    lsu: 0.10
    hif_pcie_gen3_x1: 0.55                                     # WAS 0.30 (USB-C 2.0)
    sram_0_8mb: 0.71
    lpddr5x_x16_phy: 1.20
    clock_power_routing: 0.40
    io_ring_pads_esd: 0.76
    routing_buffer: 0.10
    total_gross: 4.354                                         # at PHY=1.2 mm² (mid case); over 4.0 budget by 0.354
    shrink_path_recommended:
      phy_at_1_0mm2_best_case: -0.20
      io_ring_at_80um: -0.06
      activation_buffer_to_0_2mb: -0.08
      total_savings: -0.34
    total_with_shrinks: 4.014                                  # within 0.4% of 4.0 mm² target
    notes: |
      The Phase 0.4 area accounting fix (2026-05-14) caught that earlier drafts'
      total of 3.974 mm² dropped routing_buffer (0.10 mm²) silently. With routing
      buffer correctly included AND the PCIe Gen3 x1 HIF change AND the TIU
      addition, gross area is 4.354 mm². The recommended shrink path lands at
      4.014 mm² — provided the LPDDR5X x16 PHY quote returns at ≤ 1.0 mm² (vendor
      best case). If PHY ends up above 1.0 mm², fall back to either (a) grow die
      to 4.25 mm² (~+6% shuttle cost), or (b) LPDDR4X x16 PHY (caps model class
      at ~2.4B). See STATUS.md §5 for the LPDDR5X-vs-LPDDR4X tradeoff.

  power_summary_w:
    decode_typical: 2.4
    prefill_peak: 3.1
    deep_idle: 0.7                                             # leakage only
    fanless_envelope: comfortable

  performance_summary:
    primary_demo_target: Mistral-NeMo-3B at 8.0 tok/s decode (or Llama-3.2-3B at 7.4)
    candidate_models_at_LPDDR5X_x16:
      "0.36B SmolLM2-360M":   { tok_per_sec: 66.4, verdict: overkill }
      "0.5B Qwen2.5-0.5B":    { tok_per_sec: 47.8, verdict: very_comfortable }
      "1.2B Llama-3.2-1B":    { tok_per_sec: 19.3, verdict: very_comfortable }
      "1.1B TinyLlama":       { tok_per_sec: 21.7, verdict: very_comfortable }
      "2B Gemma-2-2B":        { tok_per_sec: 11.9, verdict: comfortable }
      "3.0B Mistral-NeMo-3B": { tok_per_sec: 8.0,  verdict: comfortable_interactive }   # SWEET SPOT
      "3.1B Qwen2.5-3B":      { tok_per_sec: 7.7,  verdict: borderline_short_ctx_best_long_ctx_via_lpddr }
      "3.2B Llama-3.2-3B":    { tok_per_sec: 7.4,  verdict: borderline_interactive }
      "3.8B Phi-3.5-mini":    { tok_per_sec: 6.3,  verdict: borderline }
      "4B (hypothetical)":    { tok_per_sec: 6.0,  verdict: borderline }
      "5B (ceiling)":         { tok_per_sec: 4.8,  verdict: just_below_threshold }
      "7B (Mistral-7B)":      { tok_per_sec: 3.3,  verdict: requires_v2_stretch_or_W3 }
      "8B (Llama-3.1-8B)":    { tok_per_sec: 3.0,  verdict: requires_v2_stretch }
    largest_reasonable_model: 4-5B class at 5 tok/s threshold (4.78B theoretical max)
    decode_regime: bandwidth_bound (LPDDR5X x16 sustained 11.94 GB/s)
    prefill_regime: compute_bound — interactive prompt ceiling 64-128 tokens
    energy_per_token_3B: ~325 mJ (~10× better than CPU; ~1.5× worse than mobile NPU)

  features_supported:
    weight_quantization:
      - INT4 per-channel groupwise (W4A8 primary)
      - INT8 fallback (W8A8 for accuracy-critical layers)
    activation_quantization:
      - INT8 per-token dynamic
    kv_quantization_modes:
      # Codec of record: ChannelQuant, tiers CQ-8 / CQ-4 / CQ-4+.
      - channelquant_CQ8 (per-token INT8 K+V)
      - channelquant_CQ4 (primary; per-channel INT4 K / per-token INT4 V; ~3.8× at ~4 bits/value, near-lossless)
      - channelquant_CQ4_plus (near-lossless tier; CQ-4 + k=2 FP16 outlier channels; HellaSwag acc_norm within ~0.4-0.8 pt of FP16 on Qwen2-0.5B/1.5B)
      - bypass_fp16 (debug / ablation; 1× compression)
    attention_variants_supported:
      - vanilla_multi_head (MHA)
      - grouped_query (GQA — Llama-3 family, Mistral-NeMo)
      - multi_query (MQA — degenerate GQA, 1 KV head)
    attention_algorithms_supported:
      - vanilla full attention
      - online softmax recurrence (Milakov & Gimelshein 2018; FlashAttention-style tiling), microcoded in VecU
      - paged_attention (vLLM block table in MSC)
    serving_features_in_hardware:
      - boot_time_model_load (LSU schedule loaded over PCIe Gen3 x1)
      - prefill_decode_unification (MatE handles both)
      - speculative_decoding_compatible (architecturally; host coordinates draft tokens)
    explicitly_NOT_supported_v0_3:
      - continuous_batching (single-session chip)
      - tier3_host_dram_eviction
      - prefix_sharing_across_sessions
      - multi_latent_attention (DeepSeek MLA — needs different KV layout)
      - mixture_of_experts (routing)
      - multimodal_vision_or_audio
      - training_or_backprop
      - dvfs_or_runtime_voltage_scaling

  load_bearing_uncertainties:
