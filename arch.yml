# Process — same as flagship; reference for shared constants
# -----------------------------------------------------------------------------
process:
  node: TSMC 16nm FinFET (N16FFC), via imec / TSMC University Program
  shuttle_program:
    primary: IMEC / Europractice mini@sic 2.0 (TSMC technologies) [C-imec-01]
    secondary: TSMC University FinFET Program via Europractice [C-imec-02]
    fallback: Muse Semiconductor (US-focused TSMC University FinFET path) [C-muse-fallback]
  pdk_status: classroom_pdk_publicly_available_fab_pdk_under_NDA
  feature_size_nm: 16
  density:
    gate_density_mtr_per_mm2: 28.2                             # WikiChip [C-14]
    sram_hd_density_mb_per_mm2: 1.25                           # 1-port HD planning estimate
  electrical:
    nominal_core_voltage_v: 0.8
    io_voltage_v: 1.8
    target_clock_mhz: 1000                                     # 1 GHz; 800 MHz fallback
  toolchain:
    synthesis: Cadence Genus or Synopsys Fusion Compiler
    pnr: Cadence Innovus or Synopsys IC Compiler II
    drc_lvs: Calibre or PVS
