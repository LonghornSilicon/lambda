# LibreLane Classic-flow hardening config for the vecu_softmax macro.
#
# STATUS: REAL RTL — vecu_softmax is the decode online-softmax slice: it buffers
# a score row (up to N fp16 scores), does the streaming max-subtract + exp-LUT +
# normalize, and emits N fp16 attention weights (probabilities). Passed the RTL
# cross-block cosim (architecture/rtl/tb/tb_chip_cosim.sv, BLOCK 2d). Re-targeted
# to GF180MCU here. The exp is a ~2%-accurate LUT (documented tolerance).
#
# Provenance (source repo, branch, commit): ../rtl/blocks/PROVENANCE.md
#
# Shares the fp16/fp32 arithmetic of the MatE fp16 path, so the clock is retimed
# loose and closed cleanly.

meta:
  version: 3
  flow: Classic

DESIGN_NAME: vecu_softmax

PDK: gf180mcuD


VERILOG_FILES:
  - dir::../rtl/blocks/vecu_softmax.sv

SYNTH_PARAMETERS:
  - N=8               # max scores per row (row buffer depth)

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 340    # ns — GF180 retime (long fp16->exp-LUT->fp32->fp16 softmax chain; worst ss-corner path ~300ns, +40ns margin so the resizer converges)

FP_SIZING: relative
FP_CORE_UTIL: 45
PL_TARGET_DENSITY_PCT: 55

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 2
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
PL_RESIZER_HOLD_SLACK_MARGIN: 0.8
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.8
RUN_POST_GRT_RESIZER_TIMING: true
GRT_ALLOW_CONGESTION: true
