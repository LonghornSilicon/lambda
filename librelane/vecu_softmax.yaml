# LibreLane Classic-flow hardening config for the vecu_softmax macro.
#
# STATUS: REAL RTL (PIPELINED) — vecu_softmax is the decode online-softmax slice:
# it buffers a score row (up to N fp16 scores), does the streaming max-subtract +
# exp-LUT + normalize, and emits N fp16 attention weights (probabilities). Passed
# the RTL cross-block cosim (architecture/rtl/tb/tb_chip_cosim.sv, BLOCK 2d).
# Re-targeted to GF180MCU here. The exp is a ~2%-accurate LUT (documented tol).
#
# Provenance (source repo, branch, commit): ../rtl/blocks/PROVENANCE.md
#
# PIPELINING: the exp eval (two serial fp32 multiplies) is now split across 3
# feed-forward register stages. Measured: the longest single stage is ~263ns at
# the ss corner (down from the un-pipelined ~366ns — the split is uneven, one
# stage still carries an fp32 mult + LUT + normalize). A 240ns clock still missed
# ss (-22.7ns) and over-bloated on resize; 300ns closes ss with margin and is
# still TIGHTER than the un-pipelined 340ns (which failed ss).

meta:
  version: 3
  flow: Classic

DESIGN_NAME: vecu_softmax

PDK: gf180mcuD


VERILOG_FILES:
  - dir::../rtl/blocks/vecu_softmax.sv

SYNTH_PARAMETERS:
  - N=8               # max scores per row (row buffer depth)

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 300    # ns — GF180 retime (3-stage-pipelined; longest ss stage ~263ns, +margin; tighter than the un-pipelined 340ns that failed ss)

FP_SIZING: relative
FP_CORE_UTIL: 45
PL_TARGET_DENSITY_PCT: 55

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 2
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
PL_RESIZER_HOLD_SLACK_MARGIN: 0.8
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.8
RUN_POST_GRT_RESIZER_TIMING: true
GRT_ALLOW_CONGESTION: true
